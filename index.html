async function sbGet(table, userKey, weekId) {
  const url = weekId
    ? `${SB_URL}/rest/v1/${table}?key=eq.${encodeURIComponent(userKey)}&week_id=eq.${weekId}&select=*`
    : `${SB_URL}/rest/v1/${table}?key=eq.${encodeURIComponent(userKey)}&select=*`;
  const r = await fetch(url, { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
  return r.ok ? r.json() : [];
}
async function sbUpsert(table, row) {
  await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates" },
    body: JSON.stringify(row),
  });
}

// Get the workout for a specific plan day and type
// Rotates A/B/C based on plan day within each phase
function getDailyWorkout(workoutType, planDay) {
  const phase = getPhase(planDay);
  const phaseName = phase.name;
  const variations = DAILY_VARIATIONS[workoutType];
  if (!variations || !variations[phaseName]) return null;
  const arr = variations[phaseName];
  // Rotate A/B/C — changes every session within the phase
  const idx = (planDay - 1) % arr.length;
  return { ...arr[idx], _phase: phase, _variation: ["A","B","C"][idx] };
}

function getPullupPhase(w) {
  if (w >= 16) return {phase:1,label:"FOUNDATION",color:"#47d4ff",target:5,desc:"Negatives + Dead Hangs + Scapular Pulls"};
  if (w >= 7)  return {phase:2,label:"BUILD",color:"#e8ff47",target:12,desc:"Volume at gym -- max sets every session + weighted Thursdays"};
  return {phase:3,label:"PEAK",color:"#ff7847",target:20,desc:"Max effort + cluster sets -- Diwali countdown"};
}

function getWeekId() {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(new Date(now).setDate(diff));
  return mon.toISOString().split("T")[0];
}
function getTodayIdx() { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; }
const SC = p => p >= 80 ? "#a8ff87" : p >= 50 ? "#e8ff47" : p > 0 ? "#ff7847" : "#555";

function Sparkline({data, color="#e8ff47", height=48}) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data, 1), w = 300, h = height, pad = 4;
  const xs = data.map((_,i) => pad + (i/(data.length-1))*(w-pad*2));
  const ys = data.map(v => h - pad - (v/max)*(h-pad*2));
  const path = xs.map((x,i) => `${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area = path + ` L${xs[xs.length-1].toFixed(1)},${h} L${xs[0].toFixed(1)},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height,display:"block"}} preserveAspectRatio="none">
      <path d={area} fill={color+"18"}/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map((x,i) => <circle key={i} cx={x} cy={ys[i]} r="3" fill={color}/>)}
    </svg>
  );
}

    }, 800);

  function setWeekData(upd) {
    setWeekDataRaw(prev => { const next = typeof upd==="function"?upd(prev):upd; syncWeek(next); return next; });
  }
  function setPullupLogs(upd) {
    setPullupLogsRaw(prev => { const next = typeof upd==="function"?upd(prev):upd; syncPullups(next); return next; });

  function toggle(dayFull, k) {
    setWeekData(prev => { const d=prev[dayFull]||{}; return {...prev,[dayFull]:{...d,[k]:!d[k]}}; });

  function setGymStatus(dayFull, val) {
    setWeekData(prev => { const d=prev[dayFull]||{}; return {...prev,[dayFull]:{...d,gym_status:val}}; });
  }
  function dayScore(dayFull, data) {
    const d=(data||weekData)[dayFull]||{};
    const total=HABITS.length+1;
    const done=[d.workout_done,...HABITS.map(h=>d[h.id])].filter(Boolean).length;
    return {done,total,pct:total?Math.round((done/total)*100):0};
  }
  function weekScore() {
    let t=0,d=0;
    FULL_DAYS.forEach(f=>{const s=dayScore(f);t+=s.total;d+=s.done;});
    return t?Math.round((d/t)*100):0;
  }
  function logPullup() {
    const val=parseInt(pullupInput);
    if(!val||val<0) return;

  const currentWeekFromServer=allWeeks.length>0?((allWeeks.find(r=>r.week_id===weekId)||{}).data||{}):{};

  const history=allWeeks.map(row=>{

      if(d.gym_status==="gym")gymDays++;
      if(d.gym_status==="home")homeDays++;
      if(d.gym_status==="rest")restDays++;
      HABITS_IDS.forEach(h=>{if(d[h])habitBreakdown[h]++;});
    });
    return {weekId:row.week_id,weekStart:new Date(row.week_id),score:totalChecks?Math.round((doneChecks/totalChecks)*100):0,gymDays,homeDays,workoutDays,restDays,habitBreakdown,raw:data};

  const bestPullup=pullupLogs.length?Math.max(...pullupLogs.map(l=>l.reps)):0;

  const pullupPct=Math.min(100,Math.round((bestPullup/20)*100));

  const S=(t)=>({background:tab===t?"#e8ff47":"transparent",color:tab===t?"#080808":"#999",border:`1px solid ${tab===t?"#e8ff47":"#2a2a2a"}`,padding:"5px 9px",borderRadius:"4px",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",fontWeight:tab===t?"800":"400"});

                  <div style={{fontSize:"9px",color:"#cccccc"}}>{ts.done}/{ts.total}</div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:14}}>

                  <div key={wt.id} onClick={()=>setGymStatus(todayFull,wt.id)}

            {(()=>{const ids=[...new Set([weekId,...allWeeks.map(r=>r.week_id)])].sort().reverse();return ids.length>1&&(<div style={{display:"flex",gap:"6px",overflowX:"auto",marginBottom:"14px",paddingBottom:"4px"}}>{ids.map(wid=>{const d=new Date(wid),label=wid===weekId?"This week":`${d.toLocaleString("default",{month:"short"})} ${d.getDate()}`,isSel=wid===selWeekId;return(<div key={wid} onClick={()=>setSelWeekId(wid)} style={{flexShrink:0,padding:"6px 12px",borderRadius:"6px",cursor:"pointer",fontSize:"10px",fontWeight:isSel?"700":"400",border:`1px solid ${isSel?"#e8ff47":"#2a2a2a"}`,background:isSel?"#e8ff4715":"#0a0a0a",color:isSel?"#e8ff47":"#777"}}>{label}</div>);})}</div>);})()}

                      const d=selWeekData[selFull]||{};
                      const upd={...selWeekData,[selFull]:{...d,gym_status:opt.val}};
                      sbUpsert("forge_logs",{key:userKey,week_id:selWeekId,data:upd,updated_at:new Date().toISOString()}).then(()=>setAllWeeks(allWeeks.map(r=>r.week_id===selWeekId?{...r,data:upd}:r)));
                    }
                  };
                  const active = selData.gym_status===opt.val;
                  return (
                    <div key={opt.val} onClick={handleClick}
                      style={{flex:1,padding:"8px",borderRadius:"6px",cursor:"pointer",textAlign:"center",
                        border:"1px solid "+(active?opt.color:"#2a2a2a"),
                        background:active?opt.color+"15":"#0a0a0a",
                        fontSize:"10px",color:active?opt.color:"#777"}}>
                      {opt.label}
                    </div>
                  );
                })}
              </div>
              {selData.gym_status&&selData.gym_status!=="rest"&&(()=>{const isgym=selData.gym_status==="gym";const moves=(isgym?GYM_WORKOUTS[selCfg.gymFocus]:HOME_WORKOUTS[selCfg.homeFocus])||[];return moves.map((m,i)=>(<div key={i} style={{display:"flex",gap:"8px",padding:"5px 0",borderBottom:i<moves.length-1?"1px solid #222":"none"}}><span style={{color:"#555",fontSize:"9px",flexShrink:0}}>{String(i+1).padStart(2,"0")}</span><div><span style={{fontSize:"11px",color:"#aaa"}}>{m.name}</span><span style={{fontSize:"10px",color:"#e8ff47",marginLeft:"6px"}}>{m.reps}</span></div></div>));})()}
            </>,{borderLeft:`3px solid ${selCfg.color}`})}
            {LBL(`LOG FOR ${selFull.toUpperCase()}`)}
            {!isCurrentWeek&&<div style={{background:"#e8ff4710",border:"1px solid #e8ff4730",borderRadius:"6px",padding:"8px 12px",marginBottom:"10px",fontSize:"10px",color:"#e8ff47"}}>📅 Past week -- you can still edit</div>}
            {selData.gym_status!=="rest"&&(()=>{
              const handleWorkoutDone = () => {
                if(isCurrentWeek){ toggle(selFull,"workout_done"); }
                else {
                  const d=selWeekData[selFull]||{};
                  const upd={...selWeekData,[selFull]:{...d,workout_done:!d.workout_done}};
                  sbUpsert("forge_logs",{key:userKey,week_id:selWeekId,data:upd,updated_at:new Date().toISOString()}).then(()=>setAllWeeks(allWeeks.map(r=>r.week_id===selWeekId?{...r,data:upd}:r)));
                }
              };
              return (
                <div onClick={handleWorkoutDone}
                  style={{background:selData.workout_done?"#e8ff4710":"#0a0a0a",border:"1px solid "+(selData.workout_done?"#e8ff47":"#2a2a2a"),borderRadius:"7px",padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px",marginBottom:"7px"}}>
                  {CB(selData.workout_done,"#e8ff47")}<span style={{fontSize:"12px",color:selData.workout_done?"#e8ff47":"#999"}}>Workout completed</span>
                </div>
              );
            })()}
            {HABITS.map(h=>{
              const handleHabit = () => {
                if(isCurrentWeek){ toggle(selFull,h.id); }
                else {
                  const d=selWeekData[selFull]||{};
                  const upd={...selWeekData,[selFull]:{...d,[h.id]:!d[h.id]}};
                  sbUpsert("forge_logs",{key:userKey,week_id:selWeekId,data:upd,updated_at:new Date().toISOString()}).then(()=>setAllWeeks(allWeeks.map(r=>r.week_id===selWeekId?{...r,data:upd}:r)));
                }
              };
              return (
                <div key={h.id} onClick={handleHabit}
                  style={{background:selData[h.id]?"#a8ff8708":"#0a0a0a",border:"1px solid "+(selData[h.id]?"#a8ff8755":"#242424"),borderRadius:"6px",padding:"9px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
                  {CB(selData[h.id])}<span style={{fontSize:"12px"}}>{h.icon}</span><span style={{fontSize:"11px",color:selData[h.id]?"#a8ff87":"#999"}}>{h.title}</span>
                </div>
              );
            })}
            {LBL("NOTE")}
            <div style={{background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"12px 14px",marginBottom:"8px"}}>
              <textarea
                placeholder="How did this day go?"
                value={selData.note||""}
                style={{width:"100%",minHeight:"80px",background:"transparent",border:"none",outline:"none",resize:"vertical",color:"#fff",fontSize:"13px",lineHeight:"1.6",fontFamily:"inherit",boxSizing:"border-box"}}
                onChange={e=>{
                  const note=e.target.value;
                  if(isCurrentWeek){
                    setWeekData(prev=>{const d=prev[selFull]||{};return{...prev,[selFull]:{...d,note}};});
                  } else {
                    const upd={...selWeekData,[selFull]:{...selWeekData[selFull]||{},note}};
                    sbUpsert("forge_logs",{key:userKey,week_id:selWeekId,data:upd,updated_at:new Date().toISOString()}).then(()=>setAllWeeks(allWeeks.map(r=>r.week_id===selWeekId?{...r,data:upd}:r)));
                  }
                }}
              />
            </div>
          </div>
        )}

        {tab==="pullups" && (
          <div>
            <div style={{background:"linear-gradient(135deg,#100800,#1a0d00)",border:"1px solid #ff780430",borderRadius:"12px",padding:"20px 18px",marginBottom:"16px",textAlign:"center"}}>
              <div style={{fontSize:"9px",color:"#ff7847",letterSpacing:"3px",marginBottom:"6px"}}>🪔 DIWALI GOAL</div>
              <div style={{fontSize:"42px",fontWeight:"800",color:"#fff",letterSpacing:"-3px",lineHeight:1}}>{DAYS_TO_DIWALI}</div>
              <div style={{fontSize:"11px",color:"#775533",marginTop:"2px"}}>days until November 8, 2026</div>
              <div style={{fontSize:"14px",color:"#ff7847",fontWeight:"700",marginTop:"10px"}}>TARGET: 20 non-stop pull-ups</div>
              <div style={{marginTop:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"#553322",marginBottom:"5px"}}><span>0</span><span style={{color:bestPullup>0?"#ff7847":"#553322"}}>Best: {bestPullup} reps</span><span>20</span></div>
                <div style={{background:"#1a0a00",borderRadius:"100px",height:"8px",overflow:"hidden"}}><div style={{height:"100%",borderRadius:"100px",background:"linear-gradient(90deg,#ff7847,#ffcc00)",width:`${pullupPct}%`,transition:"width 0.5s"}}/></div>
                <div style={{fontSize:"10px",color:"#ff784799",marginTop:"4px"}}>{pullupPct}% to goal · {PHASE.label} · Day {CURRENT_PLAN_DAY}/150</div>
              </div>
            </div>
            {CARD(<><div style={{fontSize:"9px",color:PHASE.color,letterSpacing:"2px",marginBottom:"6px"}}>{WEEKS_TO_DIWALI} WEEKS OUT</div><div style={{fontSize:"16px",fontWeight:"700",color:PHASE.color,marginBottom:"4px"}}>{PHASE.label}</div><div style={{fontSize:"11px",color:"#999"}}>{PHASE.desc}</div><div style={{fontSize:"11px",color:"#aaa",marginTop:"6px"}}>Target: <span style={{color:PHASE.color,fontWeight:"700"}}>{PHASE.target} reps</span></div></>,{borderLeft:`3px solid ${PHASE.color}`})}
            {LBL("LOG A GYM SET")}
            <div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"14px 16px",marginBottom:"14px"}}>
              <div style={{fontSize:"11px",color:"#aaa",marginBottom:"10px"}}>Best set this session:</div>
              <div style={{display:"flex",gap:"8px"}}>
                <input type="number" value={pullupInput} onChange={e=>setPullupInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&logPullup()} placeholder="e.g. 7" style={{flex:1,background:"#0e0e0e",border:"1px solid #333",color:"#e8ff47",fontSize:"20px",fontWeight:"700",padding:"8px 12px",borderRadius:"6px",outline:"none",fontFamily:"inherit"}}/>
                <button onClick={logPullup} style={{background:"#e8ff47",color:"#080808",border:"none",borderRadius:"6px",padding:"8px 20px",fontSize:"11px",fontWeight:"800",fontFamily:"inherit",cursor:"pointer"}}>LOG</button>
              </div>
            </div>
            {pullupLogs.length>0&&(<>{LBL(`ALL LOGS -- ${pullupLogs.length}`)}{CARD(<>{[...pullupLogs].reverse().slice(0,20).map((log,i)=>{const pct=Math.min(100,Math.round((log.reps/20)*100)),isMax=log.reps===bestPullup;return(<div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"6px 0",borderBottom:i<Math.min(19,pullupLogs.length-1)?"1px solid #222":"none"}}><div style={{width:"54px",fontSize:"10px",color:"#999"}}>{log.date}</div><div style={{flex:1,background:"#0e0e0e",borderRadius:"100px",height:"5px",overflow:"hidden"}}><div style={{height:"100%",borderRadius:"100px",background:isMax?"#ff7847":"#e8ff4755",width:`${pct}%`}}/></div><div style={{width:"32px",fontSize:"13px",fontWeight:"700",color:isMax?"#ff7847":"#ccc",textAlign:"right"}}>{log.reps}{isMax&&<span style={{fontSize:"8px"}}> ★</span>}</div></div>);})})</>)}</>)}
            {LBL("ROADMAP TO DIWALI")}
            {PULL_UP_PHASES.map((p,i)=>(<div key={i} style={{background:"#0a0a0a",border:`1px solid ${p.color}20`,borderLeft:`3px solid ${p.color}`,borderRadius:"8px",padding:"12px 14px",marginBottom:"8px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}><div style={{fontSize:"10px",color:p.color,fontWeight:"700"}}>{p.label} · {p.week}</div><div style={{fontSize:"11px",fontWeight:"700",color:p.color}}>{p.target}</div></div><div style={{fontSize:"10px",color:"#777",lineHeight:1.5}}>{p.detail}</div></div>))}
          </div>
        )}

        {tab==="progress" && (()=>{
          if(!history.length) return(<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:"32px",marginBottom:"12px"}}>📊</div><div style={{fontSize:"14px",color:"#e8ff47",fontWeight:"700",marginBottom:"8px"}}>No history yet</div><div style={{fontSize:"12px",color:"#777",lineHeight:1.6}}>Start logging in the Today tab.</div></div>);
          const weekScores=history.map(w=>w.score),weekLabels=history.map(w=>{const d=w.weekStart;return `${d.toLocaleString("default",{month:"short"})} ${d.getDate()}`;});
          const avgScore=Math.round(weekScores.reduce((a,b)=>a+b,0)/weekScores.length),bestScore=Math.max(...weekScores),trend=weekScores.length>=2?weekScores[weekScores.length-1]-weekScores[weekScores.length-2]:0;
          const totalGym=history.reduce((a,w)=>a+w.gymDays,0),totalHome=history.reduce((a,w)=>a+w.homeDays,0),totalRest=history.reduce((a,w)=>a+w.restDays,0);
          const puByWeek={};
          pullupLogs.forEach(l=>{const d=new Date(l.ts),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1),mon=new Date(new Date(d).setDate(diff)),wk=mon.toISOString().split("T")[0];if(!puByWeek[wk])puByWeek[wk]=[];puByWeek[wk].push(l.reps);});
          const puKeys=Object.keys(puByWeek).sort(),puBests=puKeys.map(k=>Math.max(...puByWeek[k])),puLabels=puKeys.map(k=>{const d=new Date(k);return `${d.toLocaleString("default",{month:"short"})} ${d.getDate()}`;});
          const habitTotals={};
          HABITS_IDS.forEach(h=>{const possible=history.length*7,done=history.reduce((a,w)=>a+(w.habitBreakdown[h]||0),0);habitTotals[h]={possible,done,pct:possible?Math.round((done/possible)*100):0};});
          const SUB=(v,label)=>(<button onClick={()=>setProgView(v)} style={{background:progView===v?"#e8ff47":"transparent",color:progView===v?"#080808":"#777",border:`1px solid ${progView===v?"#e8ff47":"#2a2a2a"}`,padding:"5px 12px",borderRadius:"4px",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",fontWeight:progView===v?"800":"400"}}>{label}</button>);
          return (<div>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}}>{SUB("overview","Overview")}{SUB("pullups","Pull-ups")}{SUB("habits","Habits")}{SUB("attendance","Gym/Home")}</div>
            {progView==="overview"&&(<><div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>{STAT("AVG WEEK",`${avgScore}%`,`Best: ${bestScore}%`,SC(avgScore))}{STAT("WORKOUTS",history.reduce((a,w)=>a+w.workoutDays,0),`${totalGym}g·${totalHome}h`,"#47d4ff")}{STAT("TREND",trend>=0?`+${trend}%`:`${trend}%`,"vs last week",trend>=0?"#a8ff87":"#ff7847")}</div>
              {CARD(<><Sparkline data={weekScores} color="#e8ff47" height={64}/><div style={{display:"flex",justifyContent:"space-between",marginTop:"6px"}}>{weekLabels.map((l,i)=><div key={i} style={{fontSize:"8px",color:"#777",textAlign:"center",flex:1}}>{l}</div>)}</div><div style={{display:"flex",justifyContent:"space-between",marginTop:"8px",borderTop:"1px solid #2a2a2a",paddingTop:"8px"}}>{weekScores.map((s,i)=><div key={i} style={{flex:1,textAlign:"center"}}><div style={{fontSize:"11px",fontWeight:"700",color:SC(s)}}>{s}%</div></div>)}</div></>)}
              {history.map((w,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",marginBottom:"6px",background:"#141414",borderRadius:"7px",borderLeft:`3px solid ${SC(w.score)}`}}><div style={{width:"60px",fontSize:"10px",color:"#999"}}>{weekLabels[i]}</div><div style={{flex:1,background:"#0e0e0e",borderRadius:"100px",height:"6px",overflow:"hidden"}}><div style={{height:"100%",width:`${w.score}%`,background:SC(w.score),borderRadius:"100px"}}/></div><div style={{width:"36px",fontSize:"12px",fontWeight:"700",color:SC(w.score),textAlign:"right"}}>{w.score}%</div><div style={{width:"64px",fontSize:"9px",color:"#777",textAlign:"right"}}>{w.gymDays}g·{w.homeDays}h·{w.workoutDays}✓</div></div>))}</>)}
            {progView==="pullups"&&(<><div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>{STAT("BEST",`${bestPullup}`,"reps","#ff7847")}{STAT("LAST",`${lastPullup||"--"}`,"recent","#e8ff47")}{STAT("TO GO",`${Math.max(0,20-bestPullup)}`,"reps","#a8ff87")}</div>
              {puBests.length>=2&&CARD(<><Sparkline data={puBests} color="#ff7847" height={64}/><div style={{display:"flex",justifyContent:"space-between",marginTop:"4px"}}>{puLabels.map((l,i)=><div key={i} style={{fontSize:"8px",color:"#777",textAlign:"center",flex:1}}>{l}</div>)}</div></>)}
              {pullupLogs.length>0&&CARD(<>{[...pullupLogs].reverse().map((log,i)=>{const pct=Math.min(100,Math.round((log.reps/20)*100)),isMax=log.reps===bestPullup;return(<div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"6px 0",borderBottom:i<pullupLogs.length-1?"1px solid #222":"none"}}><div style={{width:"54px",fontSize:"10px",color:"#888"}}>{log.date}</div><div style={{flex:1,background:"#0e0e0e",borderRadius:"100px",height:"5px",overflow:"hidden"}}><div style={{height:"100%",borderRadius:"100px",background:isMax?"#ff7847":"#e8ff4755",width:`${pct}%`}}/></div><div style={{width:"32px",fontSize:"13px",fontWeight:"700",color:isMax?"#ff7847":"#ccc",textAlign:"right"}}>{log.reps}{isMax&&<span style={{fontSize:"8px"}}> ★</span>}</div></div>);})}</>)}</>)}
            {progView==="habits"&&(<>{HABITS_IDS.map(h=>{const ht=habitTotals[h];return(<div key={h} style={{background:"#141414",borderRadius:"8px",padding:"12px 14px",marginBottom:"8px",border:"1px solid #2a2a2a"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}><div style={{fontSize:"12px",color:"#ddd",fontWeight:"600"}}>{HABITS.find(x=>x.id===h)?.icon} {HABIT_LABELS[h]}</div><div style={{fontSize:"13px",fontWeight:"700",color:SC(ht.pct)}}>{ht.pct}%</div></div><div style={{background:"#0e0e0e",borderRadius:"100px",height:"6px",overflow:"hidden"}}><div style={{height:"100%",width:`${ht.pct}%`,background:SC(ht.pct),borderRadius:"100px",transition:"width 0.4s"}}/></div><div style={{fontSize:"9px",color:"#555",marginTop:"4px"}}>{ht.done} of {ht.possible} days</div></div>);})}</>)}
            {progView==="attendance"&&(<><div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>{STAT("GYM",totalGym,"days","#e8ff47")}{STAT("HOME",totalHome,"days","#47d4ff")}{STAT("REST",totalRest,"days","#ff4747")}</div>
              {CARD(<>{FULL_DAYS.map(day=>{const gymCnt=history.filter(w=>(w.raw[day]||{}).gym_status==="gym").length,homeCnt=history.filter(w=>(w.raw[day]||{}).gym_status==="home").length,total=history.length;if(gymCnt+homeCnt===0)return null;const gymPct=total?Math.round((gymCnt/total)*100):0,homePct=total?Math.round((homeCnt/total)*100):0;return(<div key={day} style={{padding:"8px 0",borderBottom:"1px solid #222"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}><div style={{fontSize:"11px",color:"#ddd",fontWeight:"600"}}>{day}</div><div style={{fontSize:"10px",color:"#777"}}><span style={{color:"#e8ff47"}}>{gymCnt}x gym</span> · <span style={{color:"#47d4ff"}}>{homeCnt}x home</span></div></div><div style={{display:"flex",gap:"2px",height:"6px"}}>{gymPct>0&&<div style={{width:`${gymPct}%`,background:"#e8ff47",borderRadius:"100px 0 0 100px"}}/>}{homePct>0&&<div style={{width:`${homePct}%`,background:"#47d4ff",borderRadius:gymPct>0?"0 100px 100px 0":"100px"}}/>}</div></div>);})})</>)}</>)}
          </div>);
        })()}

        {tab==="logs" && (
          <div>
            {LBL("ALL SESSION LOGS")}
            {allWeeks.length===0?(<div style={{textAlign:"center",padding:"40px 20px",color:"#555"}}><div style={{fontSize:"24px",marginBottom:"8px"}}>📋</div><div>No logs yet.</div></div>):[...allWeeks].sort((a,b)=>new Date(b.week_id)-new Date(a.week_id)).map((row,wi)=>{
              const isOpen=expandedLog===wi,data=row.data||{},wd=new Date(row.week_id),weekLabel=`${wd.toLocaleString("default",{month:"short"})} ${wd.getDate()}`;
              let totalChecks=0,doneChecks=0;
              FULL_DAYS.forEach(day=>{const d=data[day]||{};totalChecks+=HABITS_IDS.length+1;doneChecks+=HABITS_IDS.filter(h=>d[h]).length+(d.workout_done?1:0);});
              const score=totalChecks?Math.round((doneChecks/totalChecks)*100):0;
              return(<div key={wi} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"10px",marginBottom:"10px",overflow:"hidden"}}>
                <div onClick={()=>setExpandedLog(isOpen?null:wi)} style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                  <div><div style={{fontSize:"12px",color:"#fff",fontWeight:"700"}}>Week of {weekLabel}</div><div style={{fontSize:"10px",color:"#666",marginTop:"2px"}}>{FULL_DAYS.filter(f=>(data[f]||{}).workout_done).length} workouts</div></div>
                  <div style={{display:"flex",alignItems:"center",gap:"10px"}}><div style={{fontSize:"16px",fontWeight:"800",color:SC(score)}}>{score}%</div><span style={{color:"#555"}}>{isOpen?"▲":"▼"}</span></div>
                </div>
                {isOpen&&(<div style={{padding:"0 16px 16px"}}>{FULL_DAYS.map(day=>{const d=data[day]||{},habDone=HABITS_IDS.filter(h=>d[h]).length;if(!d.gym_status&&!d.workout_done&&!d.note&&habDone===0)return null;return(<div key={day} style={{padding:"10px 12px",background:"#0d0d0d",borderRadius:"7px",marginBottom:"6px",borderLeft:`3px solid ${d.workout_done?"#a8ff87":d.gym_status==="rest"?"#ff4747":"#333"}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}><div style={{fontSize:"11px",color:"#ccc",fontWeight:"600"}}>{day}</div><div style={{display:"flex",gap:"6px",alignItems:"center"}}>{d.gym_status&&<span style={{fontSize:"9px",color:d.gym_status==="gym"?"#e8ff47":d.gym_status==="home"?"#47d4ff":"#ff4747",padding:"2px 6px",borderRadius:"3px"}}>{d.gym_status}</span>}{d.workout_done&&<span style={{fontSize:"9px",color:"#a8ff87"}}>✓</span>}<span style={{fontSize:"9px",color:"#555"}}>{habDone}/{HABITS_IDS.length}</span></div></div>{d.note&&<div style={{fontSize:"11px",color:"#888",fontStyle:"italic",marginTop:"4px"}}>"{d.note}"</div>}</div>);})}</div>)}
              </div>);
            })}
          </div>
        )}

        {tab==="habits" && (
          <div>
            {LBL("YOUR DAILY PROTOCOL")}
            {HABITS.map(h=>{const isOpen=expandedHabit===h.id;return(<div key={h.id} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"10px",marginBottom:"10px",overflow:"hidden"}}><div onClick={()=>setExpandedHabit(isOpen?null:h.id)} style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}><div style={{display:"flex",gap:"12px",alignItems:"center"}}><span style={{fontSize:"20px"}}>{h.icon}</span><div style={{fontSize:"13px",color:"#fff",fontWeight:"700"}}>{h.title}</div></div><span style={{color:"#555"}}>{isOpen?"▲":"▼"}</span></div>{isOpen&&<div style={{padding:"0 16px 16px",borderTop:"1px solid #222"}}><div style={{fontSize:"12px",color:"#aaa",lineHeight:1.6,marginTop:"10px"}}>{h.desc}</div></div>}</div>);})}
            {[
              {phase:"Foundation (Now)",color:"#4ade80",items:["Sleep anchor: 10:30pm","3 posture checks daily","Stretch every rest day","Log before sleeping"]},
              {phase:"Build (Day 51+)",color:"#facc15",items:["Pull-ups every gym visit","Shadow box 2x/week minimum","Energy check before sessions","Sunday weekly review in notes"]},
              {phase:"Peak (Day 111+)",color:"#f97316",items:["8 hrs sleep non-negotiable","Visualise 20 pull-ups daily","Taper volume Week 20-21","Rest days = Yin yoga + journaling"]},
            ].map((block,bi)=>(<div key={bi} style={{marginTop:8,background:"#0d0d0d",border:`1px solid ${block.color}22`,borderRadius:10,padding:"14px 16px",marginBottom:8}}><div style={{color:block.color,fontWeight:700,fontSize:12,marginBottom:10}}>{block.phase}</div>{block.items.map((r,i)=>(<div key={i} style={{display:"flex",gap:8,marginBottom:6}}><span style={{color:block.color,fontSize:11}}>→</span><span style={{color:"#888",fontSize:11}}>{r}</span></div>))}</div>))}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
