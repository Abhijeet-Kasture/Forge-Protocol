async function sbGet(table, userKey, weekId) {
  const url = weekId
    ? `${SB_URL}/rest/v1/${table}?key=eq.${encodeURIComponent(userKey)}&week_id=eq.${weekId}&select=*`
    : `${SB_URL}/rest/v1/${table}?key=eq.${encodeURIComponent(userKey)}&select=*`;
  const r = await fetch(url, { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
  return r.ok ? r.json() : [];
}
async function sbUpsert(table, row) {
  await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates" },
    body: JSON.stringify(row),
  });
}

function getWeekId() {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(new Date(now).setDate(diff));
  return mon.toISOString().split("T")[0];
}
function getTodayIdx() { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; }
const SC = p => p >= 80 ? "#a8ff87" : p >= 50 ? "#e8ff47" : p > 0 ? "#ff7847" : "#555";

function Sparkline({data, color="#e8ff47", height=48}) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data, 1), w = 300, h = height, pad = 4;
  const xs = data.map((_,i) => pad + (i/(data.length-1))*(w-pad*2));
  const ys = data.map(v => h - pad - (v/max)*(h-pad*2));
  const path = xs.map((x,i) => `${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area = path + ` L${xs[xs.length-1].toFixed(1)},${h} L${xs[0].toFixed(1)},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height,display:"block"}} preserveAspectRatio="none">
      <path d={area} fill={color+"18"}/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map((x,i) => <circle key={i} cx={x} cy={ys[i]} r="3" fill={color}/>)}
    </svg>
  );
}

  const [syncStatus, setSyncStatus] = useState("");
  const [planDay, setPlanDay] = useState(CURRENT_PLAN_DAY);
  const [selectedWorkoutType, setSelectedWorkoutType] = useState(null);
  const syncTimer = useRef(null);

  const weekId = getWeekId();
  const todayIdx = getTodayIdx();
  const todayFull = FULL_DAYS[todayIdx];

  useEffect(() => {
    if (!userKey) return;
    (async () => {
      setSyncing(true);
      try {
        const wRows = await sbGet("forge_logs", userKey, weekId);
        if (wRows.length > 0) setWeekDataRaw(wRows[0].data || {});
        const allRows = await sbGet("forge_logs", userKey);
        setAllWeeks(allRows);
        const puRows = await sbGet("forge_pullups", userKey);
        if (puRows.length > 0) setPullupLogsRaw(puRows[0].logs || []);
      } catch(e) {}
      setSyncing(false);
    })();
  }, [userKey]);

  function syncWeek(data) {
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(async () => {
      try {
        await sbUpsert("forge_logs", {key:userKey,week_id:weekId,data,updated_at:new Date().toISOString()});
        const allRows = await sbGet("forge_logs", userKey);
        setAllWeeks(allRows);
        setSyncStatus("saved"); setTimeout(()=>setSyncStatus(""),2000);
      } catch(e) { setSyncStatus("error"); }
    }, 800);
  }
  function syncPullups(logs) {
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(async () => {
      try {
        await sbUpsert("forge_pullups", {key:userKey,logs,updated_at:new Date().toISOString()});
        setSyncStatus("saved"); setTimeout(()=>setSyncStatus(""),2000);
      } catch(e) { setSyncStatus("error"); }
    }, 800);
  }
  function setWeekData(upd) {
    setWeekDataRaw(prev => { const next = typeof upd==="function"?upd(prev):upd; syncWeek(next); return next; });
  }
  function setPullupLogs(upd) {
    setPullupLogsRaw(prev => { const next = typeof upd==="function"?upd(prev):upd; syncPullups(next); return next; });
  }
  function toggle(dayFull, k) {
    setWeekData(prev => { const d=prev[dayFull]||{}; return {...prev,[dayFull]:{...d,[k]:!d[k]}}; });
  }
  function setGymStatus(dayFull, val) {
    setWeekData(prev => { const d=prev[dayFull]||{}; return {...prev,[dayFull]:{...d,gym_status:val}}; });
  }
  function dayScore(dayFull, data) {
    const d=(data||weekData)[dayFull]||{};
    const total=HABITS.length+1;
    const done=[d.workout_done,...HABITS.map(h=>d[h.id])].filter(Boolean).length;
    return {done,total,pct:total?Math.round((done/total)*100):0};
  }
  function weekScore() {
    let t=0,d=0;
    FULL_DAYS.forEach(f=>{const s=dayScore(f);t+=s.total;d+=s.done;});
    return t?Math.round((d/t)*100):0;
  }
  function logPullup() {
    const val=parseInt(pullupInput);
    if(!val||val<0) return;
    setPullupLogs(prev=>[...prev,{date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),reps:val,ts:Date.now()}].slice(-60));
    setPullupInput("");
  }

  const currentWeekFromServer=allWeeks.length>0?((allWeeks.find(r=>r.week_id===weekId)||{}).data||{}):{};
  const effectiveCurrentWeekData=Object.keys(weekData).length>0?weekData:currentWeekFromServer;
  const isCurrentWeek=selWeekId===weekId;
  const selWeekRow=allWeeks.find(r=>r.week_id===selWeekId);
  const selWeekData=isCurrentWeek?effectiveCurrentWeekData:(selWeekRow?selWeekRow.data||{}:{});
  const selFull=FULL_DAYS[selDay]||"Monday";
  const selCfg=DAY_CONFIG[selFull]||DAY_CONFIG["Monday"];
  const selData=(selWeekData&&selFull&&selWeekData[selFull])?selWeekData[selFull]:{};
  const todayData=effectiveCurrentWeekData[todayFull]||{};
  const todayCfg=DAY_CONFIG[todayFull];
  const ts=dayScore(todayFull);
  const ws=weekScore();

  const history=allWeeks.map(row=>{
    const data=row.data||{};
    let totalChecks=0,doneChecks=0,gymDays=0,homeDays=0,workoutDays=0,restDays=0;
    const habitBreakdown={};
    HABITS_IDS.forEach(h=>{habitBreakdown[h]=0;});
    FULL_DAYS.forEach(day=>{
      const d=data[day]||{};
      totalChecks+=HABITS_IDS.length+1;
      doneChecks+=HABITS_IDS.filter(h=>d[h]).length+(d.workout_done?1:0);
      if(d.workout_done)workoutDays++;
      if(d.gym_status==="gym")gymDays++;
      if(d.gym_status==="home")homeDays++;
      if(d.gym_status==="rest")restDays++;
      HABITS_IDS.forEach(h=>{if(d[h])habitBreakdown[h]++;});
    });
    return {weekId:row.week_id,weekStart:new Date(row.week_id),score:totalChecks?Math.round((doneChecks/totalChecks)*100):0,gymDays,homeDays,workoutDays,restDays,habitBreakdown,raw:data};
  }).sort((a,b)=>a.weekStart-b.weekStart);

  const bestPullup=pullupLogs.length?Math.max(...pullupLogs.map(l=>l.reps)):0;
  const lastPullup=pullupLogs.length?pullupLogs[pullupLogs.length-1].reps:0;
  const pullupPct=Math.min(100,Math.round((bestPullup/20)*100));

  const S=(t)=>({background:tab===t?"#e8ff47":"transparent",color:tab===t?"#080808":"#999",border:`1px solid ${tab===t?"#e8ff47":"#2a2a2a"}`,padding:"5px 9px",borderRadius:"4px",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",fontWeight:tab===t?"800":"400"});
  const CB=(checked,color="#a8ff87")=>(<div style={{width:"18px",height:"18px",borderRadius:"3px",flexShrink:0,border:`2px solid ${checked?color:"#888"}`,background:checked?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{checked&&<span style={{color:"#080808",fontSize:"10px",fontWeight:"800"}}>✓</span>}</div>);
  const LBL=(text)=><div style={{fontSize:"9px",color:"#dddddd",letterSpacing:"3px",marginBottom:"10px",marginTop:"4px"}}>{text}</div>;
  const CARD=(children,ex={})=>(<div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"10px",padding:"14px 16px",marginBottom:"10px",...ex}}>{children}</div>);
  const STAT=(label,value,sub,color="#e8ff47")=>(<div style={{background:"#141414",border:`1px solid ${color}20`,borderTop:`2px solid ${color}`,borderRadius:"8px",padding:"12px 14px",flex:1}}><div style={{fontSize:"9px",color:"#999",letterSpacing:"2px",marginBottom:"4px"}}>{label}</div><div style={{fontSize:"20px",fontWeight:"800",color,letterSpacing:"-1px"}}>{value}</div>{sub&&<div style={{fontSize:"9px",color:"#777",marginTop:"2px"}}>{sub}</div>}</div>);

  if (!userKey) return <SetupScreen onSave={setUserKey}/>;

  const planPhase=getPhase(planDay);

  function PlanTab() {
    return (
      <div>
        <div style={{background:`linear-gradient(135deg,${planPhase.color}18,#0a0a0a)`,border:`1px solid ${planPhase.color}33`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase"}}>150-Day Plan</div>
              <div style={{fontSize:18,fontWeight:800,color:planPhase.color,marginTop:2}}>{planPhase.badge} {planPhase.name} Phase</div>
              <div style={{fontSize:11,color:"#888",marginTop:4}}>{planPhase.focus}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{background:"#f97316",color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>🪔 {DAYS_TO_DIWALI}d left</div>
              <div style={{color:"#555",fontSize:10,marginTop:4}}>{planPhase.pullUpTarget}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:4,marginTop:12}}>
            {PHASES.map(p=>{const active=planDay>=p.days[0]&&planDay<=p.days[1],done=planDay>p.days[1];return(<div key={p.id} style={{flex:1,height:4,borderRadius:100,background:done?p.color:active?p.color+"88":"#2a2a2a"}}/>);})}
          </div>
          <div style={{display:"flex",marginTop:4}}>
            {PHASES.map(p=>(<div key={p.id} style={{fontSize:9,color:planDay>=p.days[0]&&planDay<=p.days[1]?p.color:"#444",textAlign:"center",flex:1}}>{p.badge} {p.name}</div>))}
          </div>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <button onClick={()=>{setPlanDay(Math.max(1,planDay-1));setSelectedWorkoutType(null);}} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"6px 14px",cursor:"pointer",fontSize:18,fontFamily:"inherit",fontWeight:300}}>'‹'</button>
          <div style={{flex:1,textAlign:"center",background:"#141414",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 10px"}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:15}}>Day {planDay} of {TOTAL_PLAN_DAYS}</div>
            <div style={{color:"#555",fontSize:10}}>{Math.max(0,TOTAL_PLAN_DAYS-planDay+1)} days remain</div>
          </div>
          <button onClick={()=>{setPlanDay(Math.min(TOTAL_PLAN_DAYS,planDay+1));setSelectedWorkoutType(null);}} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"6px 14px",cursor:"pointer",fontSize:18,fontFamily:"inherit",fontWeight:300}}>'›'</button>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {[{l:"SETS",v:planPhase.gymSets},{l:"REST",v:planPhase.restBetween},{l:"PULL-UPS",v:planPhase.pullUpTarget}].map((item,i)=>(
            <div key={i} style={{flex:1,background:"#141414",border:`1px solid ${planPhase.color}22`,borderRadius:8,padding:"7px 9px"}}>
              <div style={{fontSize:9,color:"#555",letterSpacing:1}}>{item.l}</div>
              <div style={{fontSize:11,color:planPhase.color,fontWeight:700,marginTop:2}}>{item.v}</div>
            </div>
          ))}
        </div>

        <div style={{fontSize:9,color:"#666",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Select today's workout type:</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:16}}>
          {WORKOUT_TYPES.map(wt=>{
            const active=selectedWorkoutType===wt.id;
            return (
              <div key={wt.id} onClick={()=>setSelectedWorkoutType(active?null:wt.id)}
                style={{background:active?wt.color+"18":"#0d0d0d",border:`1px solid ${active?wt.color:"#2a2a2a"}`,borderRadius:9,padding:"9px 4px",cursor:"pointer",textAlign:"center",transition:"all 0.2s"}}>
                <div style={{fontSize:18}}>{wt.icon}</div>
                <div style={{color:active?wt.color:"#666",fontSize:9,fontWeight:active?700:400,marginTop:3}}>{wt.label}</div>
                <div style={{color:"#444",fontSize:8}}>{wt.location}</div>
              </div>
            );
          })}
        </div>

        {selectedWorkoutType ? (
          <div>
            <div style={{fontSize:9,color:"#777",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Day {planDay} Recommendation</div>
            <PlanWorkoutCard type={selectedWorkoutType} phase={planPhase}/>
          </div>
        ) : (
          <div style={{textAlign:"center",padding:"24px 16px",background:"#0a0a0a",borderRadius:10,border:"1px solid #1a1a1a"}}>
            <div style={{fontSize:28,marginBottom:8}}>☝</div>
            <div style={{fontSize:12,color:"#555"}}>Select a workout type above for your Day {planDay} recommendation</div>
          </div>
        )}

        <div style={{marginTop:20}}>
          <div style={{fontSize:9,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>WEEKLY STRUCTURE</div>
          {[
            {day:"Mon",icon:"🏋",w:"Gym -- Upper Body + Pull-ups",c:"#e8ff47"},
            {day:"Tue",icon:"🥷",w:"Shadow Boxing (Home)",c:"#a78bfa"},
            {day:"Wed",icon:"🧘",w:"Yoga and Stretch (Home)",c:"#34d399"},
            {day:"Thu",icon:"🏋",w:"Gym -- Push + Pull-ups",c:"#e8ff47"},
            {day:"Fri",icon:"🥊",w:"Punch Bag (Gym) or Shadow (Home)",c:"#f87171"},
            {day:"Sat",icon:"🏠",w:"Home Workout (family-dependent)",c:"#47d4ff"},
            {day:"Sun",icon:"🌿",w:"Rest + Active Recovery",c:"#94a3b8"},
          ].map((d,i)=>(
            <div key={i} style={{display:"flex",gap:10,padding:"6px 9px",background:"#0d0d0d",borderRadius:7,marginBottom:5,borderLeft:`3px solid ${d.c}33`}}>
              <span style={{color:d.c,fontWeight:700,minWidth:26,fontSize:12}}>{d.day}</span>
              <span style={{fontSize:13}}>{d.icon}</span>
              <span style={{color:"#888",fontSize:11}}>{d.w}</span>
            </div>
          ))}
        </div>

        <div style={{marginTop:16}}>
          <div style={{fontSize:9,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>NON-NEGOTIABLE RULES</div>
          {["Never miss a Monday gym session","Stretch on every rest day","Log before sleeping","Pull-ups every single gym visit","One clean slip is not a bad day. Reset.","Rate energy before every workout"].map((r,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:6}}>
              <span style={{color:planPhase.color,fontWeight:700,fontSize:11}}>{i+1}.</span>
              <span style={{color:"#888",fontSize:11}}>{r}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:"#0e0e0e",color:"#fff",fontFamily:"'DM Mono','Courier New',monospace",paddingBottom:"env(safe-area-inset-bottom)"}}>
      <div style={{background:"#0e0e0e",borderBottom:"1px solid #1c1c1c",padding:"16px 16px 10px",position:"sticky",top:0,zIndex:100,paddingTop:"calc(16px + env(safe-area-inset-top))"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
          <div>
            <div style={{fontSize:"9px",letterSpacing:"4px",color:"#bbbbbb"}}>DAILY PERFORMANCE SYSTEM</div>
            <div style={{fontSize:"20px",fontWeight:"800",color:"#e8ff47",letterSpacing:"-1px"}}>FORGE PROTOCOL</div>
          </div>
          <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"2px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
              {syncStatus==="saved"&&<span style={{fontSize:"8px",color:"#a8ff87"}}>synced</span>}
              {syncStatus==="error"&&<span style={{fontSize:"8px",color:"#ff4747"}}>sync error</span>}
              {syncing&&<span style={{fontSize:"8px",color:"#888"}}>syncing</span>}
              <div style={{fontSize:"8px",color:"#555"}}>key: {userKey}</div>
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:"4px"}}>
              <div style={{fontSize:"8px",color:"#cccccc",letterSpacing:"2px"}}>WEEK</div>
              <div style={{fontSize:"26px",fontWeight:"800",color:SC(ws),letterSpacing:"-2px",lineHeight:1}}>{ws}%</div>
            </div>
          </div>
        </div>
        <div style={{background:"#0f0a00",border:"1px solid #ff780430",borderRadius:"6px",padding:"7px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <div>
            <div style={{fontSize:"8px",color:"#ff7847",letterSpacing:"2px"}}>🪔 DIWALI PULL-UP GOAL</div>
            <div style={{fontSize:"11px",color:"#ddd",marginTop:"2px"}}>20 non-stop pull-ups · Nov 8 2026 · Day {CURRENT_PLAN_DAY}/150</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"20px",fontWeight:"800",color:"#ff7847",letterSpacing:"-1px"}}>{DAYS_TO_DIWALI}</div>
            <div style={{fontSize:"8px",color:"#bb9977",letterSpacing:"1px"}}>DAYS LEFT</div>
          </div>
        </div>
        <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
          {["today","week","pullups","progress","logs","plan","habits"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={S(t)}>{t==="plan"?"150-day":t}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px",maxWidth:"560px",margin:"0 auto"}}>

        {tab==="today" && (
          <div>
            {CARD(<>
              <div style={{fontSize:"9px",color:"#dddddd",letterSpacing:"3px",marginBottom:"6px"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}).toUpperCase()}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:"16px",fontWeight:"700",color:todayCfg.color}}>{todayFull}</div>
                  <div style={{fontSize:"11px",color:"#cccccc",marginTop:"3px"}}>{todayCfg.windows.join(" or ")}</div>
                  <div style={{fontSize:"10px",color:"#cccccc",marginTop:"6px",lineHeight:1.5}}>{todayCfg.note}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:"10px"}}>
                  <div style={{fontSize:"26px",fontWeight:"800",color:SC(ts.pct)}}>{ts.pct}%</div>
                  <div style={{fontSize:"9px",color:"#cccccc"}}>{ts.done}/{ts.total}</div>
                </div>
              </div>
            </>,{borderLeft:`3px solid ${todayCfg.color}`})}

            {LBL("DID YOU MAKE IT TO THE GYM TODAY?")}
            <div style={{display:"flex",gap:"6px",marginBottom:"14px"}}>
              {[{val:"gym",label:"💪 Gym",color:"#e8ff47"},{val:"home",label:"🏠 Home",color:"#47d4ff"},{val:"rest",label:"❌ No workout",color:"#ff4747"}].map(opt=>(
                <div key={opt.val} onClick={()=>setGymStatus(todayFull,opt.val)} style={{flex:1,padding:"10px 6px",borderRadius:"8px",cursor:"pointer",textAlign:"center",border:`1px solid ${todayData.gym_status===opt.val?opt.color:"#2a2a2a"}`,background:todayData.gym_status===opt.val?opt.color+"18":"#0d0d0d",fontSize:"10px",fontWeight:"600",color:todayData.gym_status===opt.val?opt.color:"#999",transition:"all 0.2s"}}>{opt.label}</div>
              ))}
            </div>

            {todayData.gym_status&&todayData.gym_status!=="rest"&&(()=>{
              const isgym=todayData.gym_status==="gym";
              const focus=isgym?todayCfg.gymFocus:todayCfg.homeFocus;
              const moves=isgym?GYM_WORKOUTS[focus]:HOME_WORKOUTS[focus];
              return moves?(<>
                {LBL(`${isgym?"GYM":"HOME"} WORKOUT -- ${focus.toUpperCase()}`)}
                {CARD(<>{moves.map((m,i)=>(
                  <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",padding:"7px 0",borderBottom:i<moves.length-1?"1px solid #222":"none"}}>
                    <span style={{color:"#888",fontSize:"9px",paddingTop:"2px",flexShrink:0}}>{String(i+1).padStart(2,"0")}</span>
                    <div><span style={{fontSize:"12px",color:"#ccc"}}>{m.name}</span><span style={{fontSize:"10px",color:isgym?"#e8ff47":"#47d4ff",marginLeft:"8px"}}>{m.reps}</span><div style={{fontSize:"10px",color:"#aaa",marginTop:"1px"}}>{m.note}</div></div>
                  </div>
                ))}</>)}
                <div style={{background:"#0a0f0a",border:"1px solid #4ade8022",borderRadius:8,padding:"9px 12px",marginBottom:12,display:"flex",gap:10,alignItems:"center"}}>
                  <span>💡</span>
                  <div style={{fontSize:11,color:"#6ee7b7"}}>Full plan for Day {CURRENT_PLAN_DAY}: <span onClick={()=>setTab("plan")} style={{color:"#4ade80",textDecoration:"underline",cursor:"pointer"}}>150-day tab</span></div>
                </div>
              </>):null;
            })()}

            {todayData.gym_status==="rest"&&(<>
              <div style={{background:"#ff474710",border:"1px solid #ff474730",borderLeft:"3px solid #ff4747",borderRadius:"8px",padding:"12px 16px",marginBottom:"10px"}}>
                <div style={{fontSize:"12px",color:"#ff7a7a",fontWeight:"600",marginBottom:"3px"}}>Rest day logged</div>
                <div style={{fontSize:"11px",color:"#cc7777"}}>No workout today. Habits still count.</div>
              </div>
              <div style={{background:"#0a0a14",border:"1px solid #94a3b833",borderRadius:8,padding:"10px 12px",marginBottom:12}}>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:700,marginBottom:4}}>🌿 Rest day recovery plan:</div>
                <span style={{fontSize:11,color:"#555"}}>See options in the <span onClick={()=>{setTab("plan");setSelectedWorkoutType("rest");}} style={{color:"#94a3b8",textDecoration:"underline",cursor:"pointer"}}>150-day tab</span></span>
              </div>
            </>)}

            {todayData.gym_status&&todayData.gym_status!=="rest"&&(<>
              {LBL("MARK COMPLETE")}
              <div onClick={()=>toggle(todayFull,"workout_done")} style={{background:todayData.workout_done?"#e8ff4710":"#0d0d0d",border:`1px solid ${todayData.workout_done?"#e8ff47":"#2a2a2a"}`,borderRadius:"8px",padding:"13px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:"12px",marginBottom:"12px"}}>
                {CB(todayData.workout_done,"#e8ff47")}<span style={{fontSize:"12px",color:todayData.workout_done?"#e8ff47":"#cccccc"}}>Workout done ✓</span>
              </div>
            </>)}

            {LBL("DAILY HABITS")}
            {HABITS.map(h=>(
              <div key={h.id} onClick={()=>toggle(todayFull,h.id)} style={{background:todayData[h.id]?"#a8ff8710":"#0d0d0d",border:`1px solid ${todayData[h.id]?"#a8ff8760":"#2a2a2a"}`,borderRadius:"7px",padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px",marginBottom:"7px"}}>
                {CB(todayData[h.id])}<span style={{fontSize:"14px"}}>{h.icon}</span><span style={{fontSize:"12px",color:todayData[h.id]?"#a8ff87":"#cccccc"}}>{h.title}</span>
              </div>
            ))}

            {LBL("TODAY'S NOTE")}
            <div style={{background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"12px 14px",marginBottom:"8px"}}>
              <textarea placeholder="How did today go? Energy levels, what felt hard, what clicked..." value={todayData.note||""} onChange={e=>setWeekData(prev=>{const d=prev[todayFull]||{};return {...prev,[todayFull]:{...d,note:e.target.value}};})} style={{width:"100%",minHeight:"90px",background:"transparent",border:"none",outline:"none",resize:"vertical",color:"#fff",fontSize:"13px",lineHeight:"1.6",fontFamily:"inherit",boxSizing:"border-box"}}/>
              {todayData.note&&<div style={{fontSize:"9px",color:"#555",marginTop:"6px",borderTop:"1px solid #1a1a1a",paddingTop:"6px"}}>{todayData.note.length} chars · synced</div>}
            </div>
          </div>
        )}

        {tab==="plan" && <PlanTab/>}

        {tab==="week" && (
          <div>
            {(()=>{const ids=[...new Set([weekId,...allWeeks.map(r=>r.week_id)])].sort().reverse();return ids.length>1&&(<div style={{display:"flex",gap:"6px",overflowX:"auto",marginBottom:"14px",paddingBottom:"4px"}}>{ids.map(wid=>{const d=new Date(wid),label=wid===weekId?"This week":`${d.toLocaleString("default",{month:"short"})} ${d.getDate()}`,isSel=wid===selWeekId;return(<div key={wid} onClick={()=>setSelWeekId(wid)} style={{flexShrink:0,padding:"6px 12px",borderRadius:"6px",cursor:"pointer",fontSize:"10px",fontWeight:isSel?"700":"400",border:`1px solid ${isSel?"#e8ff47":"#2a2a2a"}`,background:isSel?"#e8ff4715":"#0a0a0a",color:isSel?"#e8ff47":"#777"}}>{label}</div>);})}</div>);})()}
            {LBL(`${selWeekId===weekId?"THIS WEEK":"WEEK OF "+selWeekId}`)}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"5px",marginBottom:"18px"}}>
              {DAYS.map((d,i)=>{const f=FULL_DAYS[i],dd=selWeekData[f]||{},total=HABITS.length+1,done=[dd.workout_done,...HABITS.map(h=>dd[h.id])].filter(Boolean).length,pct=total?Math.round((done/total)*100):0,isToday=i===todayIdx&&selWeekId===weekId,isSel=i===selDay,cfg=DAY_CONFIG[f];return(<div key={d} onClick={()=>setSelDay(i)} style={{background:isSel?"#242424":"#0a0a0a",border:`1px solid ${isSel?cfg.color:isToday?"#444":"#242424"}`,borderRadius:"8px",padding:"8px 4px",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:"8px",color:isToday?"#e8ff47":"#999",letterSpacing:"1px",marginBottom:"4px"}}>{d}{isToday?"●":""}</div><div style={{fontSize:"11px",marginBottom:"4px"}}>{cfg.gymFocus?.includes("Boxing")?"🥊":cfg.gymFocus?.includes("Lower")?"🦵":cfg.gymFocus?"💪":"🌿"}</div><div style={{fontSize:"12px",fontWeight:"700",color:SC(pct)}}>{done>0?`${pct}%`:"--"}</div></div>);})}
            </div>
            {CARD(<>

              {phase:"Peak (Day 111+)",color:"#f97316",items:["8 hrs sleep non-negotiable","Visualise 20 pull-ups daily","Taper volume Week 20-21","Rest days = Yin yoga + journaling"]},
            ].map((block,bi)=>(<div key={bi} style={{marginTop:8,background:"#0d0d0d",border:`1px solid ${block.color}22`,borderRadius:10,padding:"14px 16px",marginBottom:8}}><div style={{color:block.color,fontWeight:700,fontSize:12,marginBottom:10}}>{block.phase}</div>{block.items.map((r,i)=>(<div key={i} style={{display:"flex",gap:8,marginBottom:6}}><span style={{color:block.color,fontSize:11}}>→</span><span style={{color:"#888",fontSize:11}}>{r}</span></div>))}</div>))}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
