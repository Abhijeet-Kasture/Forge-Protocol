async function sbGet(table, userKey, weekId) {
  const url = weekId
    ? `${SB_URL}/rest/v1/${table}?key=eq.${encodeURIComponent(userKey)}&week_id=eq.${weekId}&select=*`
    : `${SB_URL}/rest/v1/${table}?key=eq.${encodeURIComponent(userKey)}&select=*`;
  const r = await fetch(url, { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
  return r.ok ? r.json() : [];
}

async function sbUpsert(table, row) {
  await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: {
      apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates",
    },
    body: JSON.stringify(row),
  });
}

function getWeekId() {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(new Date(now).setDate(diff));
  return mon.toISOString().split("T")[0];
}
function getTodayIdx() { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; }
const SC = p => p >= 80 ? "#a8ff87" : p >= 50 ? "#e8ff47" : p > 0 ? "#ff7847" : "#555";

function Sparkline({data, color="#e8ff47", height=48}) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data, 1), w = 300, h = height, pad = 4;
  const xs = data.map((_,i) => pad + (i/(data.length-1))*(w-pad*2));
  const ys = data.map(v => h - pad - (v/max)*(h-pad*2));
  const path = xs.map((x,i) => `${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area = path + ` L${xs[xs.length-1].toFixed(1)},${h} L${xs[0].toFixed(1)},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height,display:"block"}} preserveAspectRatio="none">
      <path d={area} fill={color+"18"}/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map((x,i) => <circle key={i} cx={x} cy={ys[i]} r="3" fill={color}/>)}
    </svg>
  );
}

function App() {
  const [userKey, setUserKey] = useState(() => localStorage.getItem("forge_userkey") || "");

  const [pullupLogs, setPullupLogsRaw] = useState([]);
  const [allWeeks, setAllWeeks] = useState([]);
  const [tab, setTab] = useState("today");
  const [selDay, setSelDay] = useState(getTodayIdx());
  const [selWeekId, setSelWeekId] = useState(getWeekId()); // which week is selected in Week tab
  const [expandedHabit, setExpandedHabit] = useState(null);
  const [expandedLog, setExpandedLog] = useState(null);
  const [progView, setProgView] = useState("overview");
  const [pullupInput, setPullupInput] = useState("");
  const [syncing, setSyncing] = useState(false);
  const [syncStatus, setSyncStatus] = useState(""); // "" | "saved" | "error"
  const syncTimer = useRef(null);
  const weekId = getWeekId();
  const todayIdx = getTodayIdx();
  const todayFull = FULL_DAYS[todayIdx];

  // ── Load from Supabase on mount / key change ──
  useEffect(() => {
    if (!userKey) return;
    (async () => {
      setSyncing(true);
      try {
        // Load current week
        const wRows = await sbGet("forge_logs", userKey, weekId);
        if (wRows.length > 0) setWeekDataRaw(wRows[0].data || {});
        // Load all weeks for history
        const allRows = await sbGet("forge_logs", userKey);
        setAllWeeks(allRows);
        // Load pull-ups
        const puRows = await sbGet("forge_pullups", userKey);
        if (puRows.length > 0) setPullupLogsRaw(puRows[0].logs || []);
      } catch(e) {}
      setSyncing(false);
    })();
  }, [userKey]);

  // ── Debounced sync to Supabase ──
  function syncWeek(data) {
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(async () => {
      try {
        await sbUpsert("forge_logs", {key: userKey, week_id: weekId, data, updated_at: new Date().toISOString()});
        // refresh allWeeks
        const allRows = await sbGet("forge_logs", userKey);
        setAllWeeks(allRows);
        setSyncStatus("saved");
        setTimeout(() => setSyncStatus(""), 2000);
      } catch(e) { setSyncStatus("error"); }
    }, 800);
  }

  function syncPullups(logs) {
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(async () => {
      try {
        await sbUpsert("forge_pullups", {key: userKey, logs, updated_at: new Date().toISOString()});
        setSyncStatus("saved");
        setTimeout(() => setSyncStatus(""), 2000);
      } catch(e) { setSyncStatus("error"); }
    }, 800);
  }

  function setWeekData(updater) {
    setWeekDataRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      syncWeek(next);
      return next;
    });
  }

  function setPullupLogs(updater) {
    setPullupLogsRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      syncPullups(next);
      return next;
    });
  }

  function toggle(dayFull, key) {
    setWeekData(prev => { const d = prev[dayFull]||{}; return {...prev,[dayFull]:{...d,[key]:!d[key]}}; });
  }
  function setGymStatus(dayFull, val) {
    setWeekData(prev => { const d = prev[dayFull]||{}; return {...prev,[dayFull]:{...d,gym_status:val}}; });
  }
  function dayScore(dayFull, data) {
    const d = (data||weekData)[dayFull] || {};
    const total = HABITS.length + 1;
    const done = [d.workout_done, ...HABITS.map(h => d[h.id])].filter(Boolean).length;
    return {done, total, pct: total ? Math.round((done/total)*100) : 0};
  }
  function weekScore() {
    let t=0,d=0;
    FULL_DAYS.forEach(f => { const s=dayScore(f); t+=s.total; d+=s.done; });
    return t ? Math.round((d/t)*100) : 0;
  }
  function logPullup() {
    const val = parseInt(pullupInput);
    if (!val || val < 0) return;
    const entry = {date: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}), reps:val, ts:Date.now()};
    setPullupLogs(prev => [...prev, entry].slice(-60));
    setPullupInput("");
  }

  // Build history from allWeeks
  const history = allWeeks.map(row => {
    const data = row.data || {};
    let totalChecks=0,doneChecks=0,gymDays=0,homeDays=0,workoutDays=0,restDays=0;
    const habitBreakdown = {};
    HABITS_IDS.forEach(h => { habitBreakdown[h] = 0; });
    FULL_DAYS.forEach(day => {
      const d = data[day] || {};
      const hd = HABITS_IDS.filter(h => d[h]).length;
      const wd = d.workout_done ? 1 : 0;
      totalChecks += HABITS_IDS.length + 1;
      doneChecks += hd + wd;
      if (d.workout_done) workoutDays++;
      if (d.gym_status === "gym") gymDays++;
      if (d.gym_status === "home") homeDays++;
      if (d.gym_status === "rest") restDays++;
      HABITS_IDS.forEach(h => { if (d[h]) habitBreakdown[h]++; });
    });
    return {
      weekId: row.week_id,
      weekStart: new Date(row.week_id),
      score: totalChecks ? Math.round((doneChecks/totalChecks)*100) : 0,

  const bestPullup = pullupLogs.length ? Math.max(...pullupLogs.map(l=>l.reps)) : 0;
  const lastPullup = pullupLogs.length ? pullupLogs[pullupLogs.length-1].reps : 0;

  const ws = weekScore();
  const ts = dayScore(todayFull);
  const todayCfg = DAY_CONFIG[todayFull];
  const todayData = (effectiveCurrentWeekData && todayFull && effectiveCurrentWeekData[todayFull]) ? effectiveCurrentWeekData[todayFull] : {};
  const selFull = FULL_DAYS[selDay] || "Monday";

  const isCurrentWeek = selWeekId === weekId;
  // For current week use live weekData, but fall back to allWeeks if weekData is empty

  const currentWeekFromServer = allWeeks.length > 0 ? ((allWeeks.find(r => r.week_id === weekId) || {}).data || {}) : {};
  const effectiveCurrentWeekData = Object.keys(weekData).length > 0 ? weekData : currentWeekFromServer;
  const selWeekRow = allWeeks.find(r => r.week_id === selWeekId);
  const selWeekData = isCurrentWeek
    ? effectiveCurrentWeekData

  const selData = (selWeekData && selFull && selWeekData[selFull]) ? selWeekData[selFull] : {};

  // ─ UI helpers ─
  const S = (t) => ({
    background: tab===t?"#e8ff47":"transparent",

  const CARD = (children, ex={}) => (

              const allWeekIds = [...new Set([weekId, ...allWeeks.map(r=>r.week_id)])].sort().reverse();
              return allWeekIds.length > 1 && (
                <div style={{display:"flex",gap:"6px",overflowX:"auto",marginBottom:"14px",paddingBottom:"4px"}}>

                    return (
                      <div key={wid} onClick={() => setSelWeekId(wid)} style={{flexShrink:0,padding:"6px 12px",borderRadius:"6px",cursor:"pointer",fontSize:"10px",fontWeight:isSel?"700":"400",border:`1px solid ${isSel?"#e8ff47":"#2a2a2a"}`,background:isSel?"#e8ff4715":"#0a0a0a",color:isSel?"#e8ff47":"#777"}}>
                        {label}
                      </div>

            {LBL(`${selWeekId === weekId ? "THIS WEEK" : "WEEK OF "+selWeekId} — TAP DAY TO LOG`)}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"5px",marginBottom:"18px"}}>
              {DAYS.map((d,i) => {

                const pct = total ? Math.round((done/total)*100) : 0;
                const isToday=i===todayIdx && selWeekId===weekId, isSel=i===selDay, cfg=DAY_CONFIG[f];
                return (
                  <div key={d} onClick={() => setSelDay(i)} style={{background:isSel?"#242424":"#0a0a0a",border:`1px solid ${isSel?cfg.color:isToday?"#444":"#242424"}`,borderRadius:"8px",padding:"8px 4px",cursor:"pointer",textAlign:"center"}}>

                    <div style={{fontSize:"12px",fontWeight:"700",color:SC(pct)}}>{done>0?`${pct}%`:"—"}</div>

            {CARD(<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                <div>
                  <div style={{fontSize:"15px",fontWeight:"700",color:selCfg.color}}>{selFull}</div>
                  <div style={{fontSize:"10px",color:"#999",marginTop:"2px"}}>{selCfg.windows.join(" · ")}</div>
                </div>
                {(() => {
                  const total = HABITS.length + 1;
                  const done = [selData.workout_done, ...HABITS.map(h=>selData[h.id])].filter(Boolean).length;
                  const pct = total ? Math.round((done/total)*100) : 0;
                  return <div style={{fontSize:"22px",fontWeight:"800",color:SC(pct)}}>{done > 0 ? `${pct}%` : "—"}</div>;
                })()}

              <div style={{fontSize:"10px",color:"#aaa",marginBottom:"12px"}}>{selCfg.note}</div>
              <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
                {[{val:"gym",label:"💪 Gym",color:"#e8ff47"},{val:"home",label:"🏠 Home",color:"#47d4ff"},{val:"rest",label:"❌ Rest",color:"#ff4747"}].map(opt => (

                  }} style={{flex:1,padding:"8px",borderRadius:"6px",cursor:"pointer",textAlign:"center",border:`1px solid ${selData.gym_status===opt.val?opt.color:"#2a2a2a"}`,background:selData.gym_status===opt.val?opt.color+"15":"#0a0a0a",fontSize:"10px",color:selData.gym_status===opt.val?opt.color:"#777"}}>{opt.label}</div>

              </div>

            {selData.gym_status!=="rest" && (
              <div onClick={() => { if(isCurrentWeek) toggle(selFull,"workout_done"); else { const d=selWeekData[selFull]||{}; const updated={...selWeekData,[selFull]:{...d,workout_done:!d.workout_done}}; sbUpsert("forge_logs",{key:userKey,week_id:selWeekId,data:updated,updated_at:new Date().toISOString()}).then(()=>{ const allRows=allWeeks.map(r=>r.week_id===selWeekId?{...r,data:updated}:r); setAllWeeks(allRows); }); }}} style={{background:selData.workout_done?"#e8ff4710":"#0a0a0a",border:`1px solid ${selData.workout_done?"#e8ff47":"#2a2a2a"}`,borderRadius:"7px",padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px",marginBottom:"7px"}}>

              <div style={{fontSize:"9px",color:PHASE.color,letterSpacing:"2px",marginBottom:"6px"}}>CURRENT PHASE — {WEEKS_TO_DIWALI} WEEKS OUT</div>

              <div style={{fontSize:"11px",color:"#999"}}>{PHASE.desc}</div>
              <div style={{fontSize:"11px",color:"#aaa",marginTop:"6px"}}>Current target: <span style={{color:PHASE.color,fontWeight:"700"}}>{PHASE.target} reps</span></div>
            </>,{borderLeft:`3px solid ${PHASE.color}`})}

            {LBL("LOG A GYM SET")}
            <div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"14px 16px",marginBottom:"14px"}}>
              <div style={{fontSize:"11px",color:"#aaa",marginBottom:"10px"}}>Best set this gym session — log your reps:</div>
              <div style={{display:"flex",gap:"8px"}}>
                <input type="number" value={pullupInput} onChange={e=>setPullupInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&logPullup()} placeholder="e.g. 7"
                  style={{flex:1,background:"#0e0e0e",border:"1px solid #333",color:"#e8ff47",fontSize:"20px",fontWeight:"700",padding:"8px 12px",borderRadius:"6px",outline:"none",fontFamily:"inherit"}}/>
                <button onClick={logPullup} style={{background:"#e8ff47",color:"#080808",border:"none",borderRadius:"6px",padding:"8px 20px",fontSize:"11px",fontWeight:"800",fontFamily:"inherit",cursor:"pointer",letterSpacing:"1px"}}>LOG</button>
              </div>
            </div>

            {pullupLogs.length > 0 && (<>
              {LBL(`ALL LOGS — ${pullupLogs.length} SESSIONS`)}
              {CARD(<>
                {[...pullupLogs].reverse().slice(0,20).map((log,i) => {
                  const pct=Math.min(100,Math.round((log.reps/20)*100)), isMax=log.reps===bestPullup;
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"6px 0",borderBottom:i<Math.min(19,pullupLogs.length-1)?"1px solid #222":"none"}}>
                      <div style={{width:"54px",fontSize:"10px",color:"#999"}}>{log.date}</div>
                      <div style={{flex:1,background:"#0e0e0e",borderRadius:"100px",height:"5px",overflow:"hidden"}}>
                        <div style={{height:"100%",borderRadius:"100px",background:isMax?"#ff7847":"#e8ff4755",width:`${pct}%`}}/>
                      </div>
                      <div style={{width:"32px",fontSize:"13px",fontWeight:"700",color:isMax?"#ff7847":"#ccc",textAlign:"right"}}>
                        {log.reps}{isMax&&<span style={{fontSize:"8px"}}> ★</span>}
                      </div>
                    </div>
                  );
                })}
              </>)}
            </>)}

            {LBL("ROADMAP TO DIWALI")}
            {PULL_UP_PHASES.map((p,i) => (
              <div key={i} style={{background:"#0a0a0a",border:`1px solid ${p.color}20`,borderLeft:`3px solid ${p.color}`,borderRadius:"8px",padding:"12px 14px",marginBottom:"8px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
                  <div style={{fontSize:"10px",color:p.color,fontWeight:"700",letterSpacing:"1px"}}>{p.label} · {p.week}</div>
                  <div style={{fontSize:"11px",fontWeight:"700",color:p.color}}>{p.target}</div>
                </div>
                <div style={{fontSize:"10px",color:"#777",lineHeight:1.5}}>{p.detail}</div>
              </div>
            ))}
          </div>
        )}

        {/* ══ PROGRESS ══ */}
        {tab==="progress" && (() => {
          if (!history.length) return (
            <div style={{textAlign:"center",padding:"40px 20px"}}>
              <div style={{fontSize:"32px",marginBottom:"12px"}}>📊</div>
              <div style={{fontSize:"14px",color:"#e8ff47",fontWeight:"700",marginBottom:"8px"}}>No history yet</div>
              <div style={{fontSize:"12px",color:"#777",lineHeight:1.6}}>Start logging daily in the Today tab.<br/>Charts build here automatically week by week.</div>
            </div>
          );
          const weekScores = history.map(w=>w.score);
          const weekLabels = history.map(w => { const d=w.weekStart; return `${d.toLocaleString("default",{month:"short"})} ${d.getDate()}`; });
          const avgScore = Math.round(weekScores.reduce((a,b)=>a+b,0)/weekScores.length);
          const bestScore = Math.max(...weekScores);
          const trend = weekScores.length>=2 ? weekScores[weekScores.length-1]-weekScores[weekScores.length-2] : 0;
          const totalGym = history.reduce((a,w)=>a+w.gymDays,0);
          const totalHome = history.reduce((a,w)=>a+w.homeDays,0);
          const totalRest = history.reduce((a,w)=>a+w.restDays,0);
          const puByWeek = {};
          pullupLogs.forEach(l => { const d=new Date(l.ts),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1),mon=new Date(new Date(d).setDate(diff)),wk=mon.toISOString().split("T")[0]; if(!puByWeek[wk])puByWeek[wk]=[]; puByWeek[wk].push(l.reps); });
          const puKeys=Object.keys(puByWeek).sort(), puBests=puKeys.map(k=>Math.max(...puByWeek[k])), puLabels=puKeys.map(k=>{const d=new Date(k);return `${d.toLocaleString("default",{month:"short"})} ${d.getDate()}`;});
          const habitTotals={};
          HABITS_IDS.forEach(h => { const possible=history.length*7, done=history.reduce((a,w)=>a+(w.habitBreakdown[h]||0),0); habitTotals[h]={possible,done,pct:possible?Math.round((done/possible)*100):0}; });
          const SUB = (v,label) => (
            <button onClick={()=>setProgView(v)} style={{background:progView===v?"#e8ff47":"transparent",color:progView===v?"#080808":"#777",border:`1px solid ${progView===v?"#e8ff47":"#2a2a2a"}`,padding:"5px 12px",borderRadius:"4px",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",fontWeight:progView===v?"800":"400"}}>{label}</button>
          );
          return (
            <div>
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}}>
                {SUB("overview","Overview")}{SUB("pullups","Pull-ups")}{SUB("habits","Habits")}{SUB("attendance","Gym/Home")}
              </div>

              {progView==="overview" && (<>
                {LBL(`${history.length} WEEK${history.length!==1?"S":""} OF DATA`)}
                <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
                  {STAT("AVG WEEK",`${avgScore}%`,`Best: ${bestScore}%`,SC(avgScore))}
                  {STAT("WORKOUTS",history.reduce((a,w)=>a+w.workoutDays,0),`${totalGym}g · ${totalHome}h`,"#47d4ff")}
                  {STAT("TREND",trend>=0?`+${trend}%`:`${trend}%`,"vs last week",trend>=0?"#a8ff87":"#ff7847")}
                </div>
                {LBL("WEEKLY SCORE TREND")}
                {CARD(<>
                  <Sparkline data={weekScores} color="#e8ff47" height={64}/>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:"6px"}}>
                    {weekLabels.map((l,i)=><div key={i} style={{fontSize:"8px",color:"#777",textAlign:"center",flex:1}}>{l}</div>)}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:"8px",borderTop:"1px solid #2a2a2a",paddingTop:"8px"}}>
                    {weekScores.map((s,i)=><div key={i} style={{flex:1,textAlign:"center"}}><div style={{fontSize:"11px",fontWeight:"700",color:SC(s)}}>{s}%</div></div>)}
                  </div>
                </>)}
                {LBL("WEEK BY WEEK")}
                {history.map((w,i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",marginBottom:"6px",background:"#141414",borderRadius:"7px",borderLeft:`3px solid ${SC(w.score)}`}}>
                    <div style={{width:"60px",fontSize:"10px",color:"#999"}}>{weekLabels[i]}</div>
                    <div style={{flex:1,background:"#0e0e0e",borderRadius:"100px",height:"6px",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${w.score}%`,background:SC(w.score),borderRadius:"100px"}}/>
                    </div>
                    <div style={{width:"36px",fontSize:"12px",fontWeight:"700",color:SC(w.score),textAlign:"right"}}>{w.score}%</div>
                    <div style={{width:"64px",fontSize:"9px",color:"#777",textAlign:"right"}}>{w.gymDays}g·{w.homeDays}h·{w.workoutDays}✓</div>
                  </div>
                ))}
              </>)}

              {progView==="pullups" && (<>
                {LBL("PULL-UP PROGRESSION")}
                <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
                  {STAT("BEST EVER",`${bestPullup}`,"reps in one set","#ff7847")}
                  {STAT("LAST SET",`${lastPullup||"—"}`,"most recent","#e8ff47")}
                  {STAT("TO GOAL",`${Math.max(0,20-bestPullup)}`,"reps left","#a8ff87")}
                </div>
                {puBests.length>=2 && (<>
                  {LBL("WEEKLY BEST TREND")}
                  {CARD(<>
                    <Sparkline data={puBests} color="#ff7847" height={64}/>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:"4px"}}>
                      {puLabels.map((l,i)=><div key={i} style={{fontSize:"8px",color:"#777",textAlign:"center",flex:1}}>{l}</div>)}
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:"8px",borderTop:"1px solid #2a2a2a",paddingTop:"8px"}}>
                      {puBests.map((s,i)=><div key={i} style={{flex:1,textAlign:"center"}}><div style={{fontSize:"11px",fontWeight:"700",color:"#ff7847"}}>{s}</div></div>)}
                    </div>
                  </>)}
                </>)}
                {pullupLogs.length>0 && (<>
                  {LBL(`ALL LOGS — ${pullupLogs.length}`)}
                  {CARD(<>
                    {[...pullupLogs].reverse().map((log,i) => {
                      const pct=Math.min(100,Math.round((log.reps/20)*100)),isMax=log.reps===bestPullup;
                      return (
                        <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"6px 0",borderBottom:i<pullupLogs.length-1?"1px solid #222":"none"}}>
                          <div style={{width:"54px",fontSize:"10px",color:"#888"}}>{log.date}</div>
                          <div style={{flex:1,background:"#0e0e0e",borderRadius:"100px",height:"5px",overflow:"hidden"}}>
                            <div style={{height:"100%",borderRadius:"100px",background:isMax?"#ff7847":"#e8ff4755",width:`${pct}%`}}/>
                          </div>
                          <div style={{width:"32px",fontSize:"13px",fontWeight:"700",color:isMax?"#ff7847":"#ccc",textAlign:"right"}}>{log.reps}{isMax&&<span style={{fontSize:"8px"}}> ★</span>}</div>
                        </div>
                      );
                    })}
                  </>)}
                </>)}
              </>)}

              {progView==="habits" && (<>
                {LBL(`HABIT CONSISTENCY — ALL ${history.length} WEEKS`)}
                {HABITS_IDS.map(h => {
                  const ht=habitTotals[h];
                  return (
                    <div key={h} style={{background:"#141414",borderRadius:"8px",padding:"12px 14px",marginBottom:"8px",border:"1px solid #2a2a2a"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                        <div style={{fontSize:"12px",color:"#ddd",fontWeight:"600"}}>{HABITS.find(x=>x.id===h)?.icon} {HABIT_LABELS[h]}</div>
                        <div style={{fontSize:"13px",fontWeight:"700",color:SC(ht.pct)}}>{ht.pct}%</div>
                      </div>
                      <div style={{background:"#0e0e0e",borderRadius:"100px",height:"6px",overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${ht.pct}%`,background:SC(ht.pct),borderRadius:"100px",transition:"width 0.4s"}}/>
                      </div>
                      <div style={{fontSize:"9px",color:"#555",marginTop:"4px"}}>{ht.done} of {ht.possible} possible days</div>
                    </div>
                  );
                })}
                {history.length>=2 && (<>
                  {LBL("THIS WEEK VS LAST WEEK")}
                  {CARD(<>
                    {HABITS_IDS.map(h => {
                      const tw=history[history.length-1].habitBreakdown[h]||0, lw=history[history.length-2].habitBreakdown[h]||0, delta=tw-lw;
                      return (
                        <div key={h} style={{display:"flex",alignItems:"center",gap:"10px",padding:"7px 0",borderBottom:"1px solid #222"}}>
                          <div style={{width:"70px",fontSize:"10px",color:"#ccc"}}>{HABIT_LABELS[h]}</div>
                          <div style={{flex:1,display:"flex",gap:"6px",alignItems:"center"}}>
                            <div style={{fontSize:"11px",color:"#888"}}>Last: <span style={{color:"#ccc"}}>{lw}/7</span></div>
                            <div style={{fontSize:"11px",color:"#555"}}>→</div>
                            <div style={{fontSize:"11px",color:"#ccc"}}>This: <span style={{color:delta>0?"#a8ff87":delta<0?"#ff7847":"#ccc"}}>{tw}/7</span></div>
                          </div>
                          <div style={{fontSize:"11px",fontWeight:"700",color:delta>0?"#a8ff87":delta<0?"#ff7847":"#555",width:"28px",textAlign:"right"}}>{delta>0?`+${delta}`:delta<0?delta:"="}</div>
                        </div>
                      );
                    })}
                  </>)}
                </>)}
              </>)}

              {progView==="attendance" && (<>
                {LBL("GYM VS HOME BREAKDOWN")}
                <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
                  {STAT("GYM",totalGym,"days at gym","#e8ff47")}
                  {STAT("HOME",totalHome,"home workouts","#47d4ff")}
                  {STAT("SKIPPED",totalRest,"no workout","#ff4747")}
                </div>
                {LBL("WEEKLY SPLIT")}
                {CARD(<>
                  <div style={{display:"flex",alignItems:"flex-end",gap:"6px",height:"80px",marginBottom:"6px"}}>
                    {history.map((w,i) => {
                      const gymH=Math.round((w.gymDays/6)*72), homeH=Math.round((w.homeDays/6)*72);
                      return (
                        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"72px",gap:"2px"}}>
                          {w.gymDays>0&&<div style={{width:"100%",height:gymH,background:"#e8ff47",borderRadius:"2px 2px 0 0",minHeight:3}}/>}
                          {w.homeDays>0&&<div style={{width:"100%",height:homeH,background:"#47d4ff",borderRadius:w.gymDays>0?"0":"2px 2px 0 0",minHeight:3}}/>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",gap:"6px"}}>
                    {history.map((w,i)=>(
                      <div key={i} style={{flex:1,textAlign:"center"}}>
                        <div style={{fontSize:"8px",color:"#e8ff47"}}>{w.gymDays}g</div>
                        <div style={{fontSize:"8px",color:"#47d4ff"}}>{w.homeDays}h</div>
                        <div style={{fontSize:"7px",color:"#555",marginTop:"2px"}}>{weekLabels[i]?.split(" ")[1]}</div>
                      </div>
                    ))}
                  </div>
                </>)}
                {LBL("BY DAY OF WEEK")}
                {CARD(<>
                  {FULL_DAYS.map(day => {
                    const gymCnt=history.filter(w=>(w.raw[day]||{}).gym_status==="gym").length;
                    const homeCnt=history.filter(w=>(w.raw[day]||{}).gym_status==="home").length;
                    const total=history.length;
                    if(gymCnt+homeCnt===0) return null;
                    const gymPct=total?Math.round((gymCnt/total)*100):0, homePct=total?Math.round((homeCnt/total)*100):0;
                    return (
                      <div key={day} style={{padding:"8px 0",borderBottom:"1px solid #222"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
                          <div style={{fontSize:"11px",color:"#ddd",fontWeight:"600"}}>{day}</div>
                          <div style={{fontSize:"10px",color:"#777"}}><span style={{color:"#e8ff47"}}>{gymCnt}× gym</span> · <span style={{color:"#47d4ff"}}>{homeCnt}× home</span></div>
                        </div>
                        <div style={{display:"flex",gap:"2px",height:"6px"}}>
                          {gymPct>0&&<div style={{width:`${gymPct}%`,background:"#e8ff47",borderRadius:"100px 0 0 100px"}}/>}
                          {homePct>0&&<div style={{width:`${homePct}%`,background:"#47d4ff",borderRadius:gymPct>0?"0 100px 100px 0":"100px"}}/>}
                        </div>
                      </div>
                    );
                  })}
                </>)}
              </>)}
            </div>
          );
        })()}

        {/* ══ LOGS ══ */}
        {tab==="logs" && (() => {
          const allDays = [];
          history.forEach(w => {
            FULL_DAYS.forEach((day,di) => {
              const d = w.raw[day];
              if (!d) return;
              if (!d.workout_done && !HABITS_IDS.some(h=>d[h]) && !d.note && !d.gym_status) return;
              const date = new Date(w.weekStart);
              date.setDate(date.getDate()+di);
              allDays.push({date,day,data:d});
            });
          });
          allDays.sort((a,b)=>b.date-a.date);
          if (!allDays.length) return (
            <div style={{textAlign:"center",padding:"40px 20px"}}>
              <div style={{fontSize:"32px",marginBottom:"12px"}}>📓</div>
              <div style={{fontSize:"14px",color:"#e8ff47",fontWeight:"700",marginBottom:"8px"}}>No logs yet</div>
              <div style={{fontSize:"12px",color:"#777",lineHeight:1.6}}>Start checking off habits in Today.<br/>Every day you log shows up here.</div>
            </div>
          );
          return (
            <div>
              {LBL(`${allDays.length} DAYS LOGGED`)}
              {allDays.map((entry,i) => {
                const {date,day,data}=entry, cfg=DAY_CONFIG[day];
                const habitsDone=HABITS_IDS.filter(h=>data[h]).length;
                const score=Math.round(((habitsDone+(data.workout_done?1:0))/(HABITS_IDS.length+1))*100);
                const dateLabel=date.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
                const isOpen=expandedLog===i;
                return (
                  <div key={i} style={{marginBottom:"8px"}}>
                    <div onClick={()=>setExpandedLog(isOpen?null:i)} style={{background:"#141414",border:`1px solid ${isOpen?cfg.color+"55":"#2a2a2a"}`,borderLeft:`3px solid ${SC(score)}`,borderRadius:isOpen?"8px 8px 0 0":"8px",padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"12px",fontWeight:"700",color:"#fff"}}>{dateLabel}</div>
                        <div style={{fontSize:"10px",color:"#777",marginTop:"2px"}}>
                          {data.gym_status==="gym"?"💪 Gym":data.gym_status==="home"?"🏠 Home":data.gym_status==="rest"?"❌ No workout":"—"} · {cfg.gymFocus||cfg.homeFocus}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:"3px"}}>
                        {HABITS_IDS.map(h=><div key={h} style={{width:"6px",height:"6px",borderRadius:"50%",background:data[h]?"#a8ff87":"#2a2a2a"}}/>)}
                      </div>
                      <div style={{fontSize:"13px",fontWeight:"800",color:SC(score),minWidth:"36px",textAlign:"right"}}>{score}%</div>
                      {data.note&&<div style={{fontSize:"10px",color:"#555"}}>✏️</div>}
                      <div style={{fontSize:"10px",color:"#444"}}>{isOpen?"▲":"▼"}</div>
                    </div>
                    {isOpen && (
                      <div style={{background:"#0f0f0f",border:`1px solid ${cfg.color}25`,borderTop:"none",borderRadius:"0 0 8px 8px",padding:"14px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                          <div style={{width:"14px",height:"14px",borderRadius:"3px",background:data.workout_done?"#e8ff47":"#1a1a1a",border:`1px solid ${data.workout_done?"#e8ff47":"#333"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                            {data.workout_done&&<span style={{fontSize:"8px",color:"#080808",fontWeight:"800"}}>✓</span>}
                          </div>
                          <span style={{fontSize:"11px",color:data.workout_done?"#e8ff47":"#777"}}>
                            Workout {data.workout_done?"completed":"not logged"}
                          </span>
                          {data.gym_status&&<span style={{fontSize:"9px",color:data.gym_status==="gym"?"#e8ff47":data.gym_status==="home"?"#47d4ff":"#ff7a7a",marginLeft:"4px"}}>({data.gym_status==="rest"?"rest day":data.gym_status})</span>}
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"12px"}}>
                          {HABITS.map(h=>(
                            <div key={h.id} style={{display:"flex",alignItems:"center",gap:"6px",padding:"4px 0"}}>
                              <div style={{width:"6px",height:"6px",borderRadius:"50%",flexShrink:0,background:data[h.id]?"#a8ff87":"#2a2a2a"}}/>
                              <span style={{fontSize:"10px",color:data[h.id]?"#ccc":"#555"}}>{h.icon} {h.title}</span>
                            </div>
                          ))}
                        </div>
                        {data.note ? (
                          <div style={{background:"#141414",borderRadius:"6px",padding:"10px 12px",borderLeft:"2px solid #e8ff4755"}}>
                            <div style={{fontSize:"9px",color:"#555",letterSpacing:"2px",marginBottom:"6px"}}>NOTE</div>
                            <div style={{fontSize:"12px",color:"#ddd",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{data.note}</div>
                          </div>
                        ) : (
                          <div style={{fontSize:"10px",color:"#444",fontStyle:"italic"}}>No note written for this day.</div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })()}

        {/* ══ PLAN ══ */}
        {tab==="plan" && (
          <div>
            {LBL("WEEKLY STRUCTURE")}
            {FULL_DAYS.map((d,i) => {
              const cfg=DAY_CONFIG[d], isToday=i===todayIdx;
              return (
                <div key={d} style={{background:isToday?"#141414":"#0a0a0a",border:`1px solid ${cfg.color}20`,borderLeft:`3px solid ${isToday?cfg.color:cfg.color+"55"}`,borderRadius:"8px",padding:"13px 14px",marginBottom:"8px"}}>
                  <div style={{fontSize:"12px",fontWeight:"700",color:cfg.color,marginBottom:"3px"}}>{DAYS[i]} — {d}{isToday?" ● TODAY":""}</div>
                  <div style={{fontSize:"10px",color:"#999",marginBottom:"4px"}}>{cfg.windows.join(" · ")}</div>
                  <div style={{display:"flex",gap:"6px",marginBottom:"6px",flexWrap:"wrap"}}>
                    {cfg.gymFocus&&<div style={{fontSize:"9px",background:"#e8ff4715",color:"#e8ff47",padding:"3px 8px",borderRadius:"4px"}}>💪 {cfg.gymFocus}</div>}
                    {cfg.homeFocus&&<div style={{fontSize:"9px",background:"#47d4ff15",color:"#47d4ff",padding:"3px 8px",borderRadius:"4px"}}>🏠 {cfg.homeFocus}</div>}
                  </div>
                  <div style={{fontSize:"10px",color:"#888"}}>{cfg.note}</div>
                </div>
              );
            })}
            {LBL("THE GYM DECISION RULE")}
            {CARD(<>
              {[
                {day:"Mon / Tue / Thu",color:"#e8ff47",rules:["Work clears before 9:45am → DRIVE. Bag was packed last night.","Work runs long → flip to evening 8pm slot after Arjun sleeps.","Evening also gone → 20-min home session. Never zero."]},
                {day:"Wed / Fri",color:"#47d4ff",rules:["Evening ONLY. Arjun asleep → shoes on, drive, arrive by 8:20.","Arjun takes until 10pm → home workout instead. Log it.","Exhausted → 10-min shadow boxing or stretch. Keep the chain."]},
                {day:"Saturday",color:"#ff7847",rules:["Home plan is the default. Walk with Arjun counts.","Weather opens a window AND Arjun is sorted → gym is a bonus."]},
              ].map((g,i) => (
                <div key={i} style={{marginBottom:i<2?"14px":"0"}}>
                  <div style={{fontSize:"10px",color:g.color,fontWeight:"700",marginBottom:"6px",letterSpacing:"1px"}}>{g.day}</div>
                  {g.rules.map((r,j) => (
                    <div key={j} style={{fontSize:"11px",color:"#999",padding:"3px 0",display:"flex",gap:"6px"}}>
                      <span style={{color:g.color,flexShrink:0}}>{j+1}.</span>{r}
                    </div>
                  ))}
                </div>
              ))}
            </>)}
          </div>
        )}

        {/* ══ HABITS ══ */}
        {tab==="habits" && (
          <div>
            {LBL("BEHAVIOURAL SHIFTS")}
            {HABITS.map(h => (
              <div key={h.id} style={{marginBottom:"8px"}}>
                <div onClick={()=>setExpandedHabit(expandedHabit===h.id?null:h.id)} style={{background:"#141414",border:`1px solid ${expandedHabit===h.id?"#2a2a2a":"#1c1c1c"}`,borderRadius:expandedHabit===h.id?"8px 8px 0 0":"8px",padding:"13px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:"12px"}}>
                  <span style={{fontSize:"17px"}}>{h.icon}</span>
                  <span style={{fontSize:"12px",fontWeight:"600",color:"#ddd",flex:1}}>{h.title}</span>
                  <span style={{color:"#555",fontSize:"11px"}}>{expandedHabit===h.id?"▲":"▼"}</span>
                </div>
                {expandedHabit===h.id&&(
                  <div style={{background:"#0d0d0d",border:"1px solid #1a1a1a",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"13px 16px",fontSize:"12px",color:"#aaa",lineHeight:"1.7"}}>{h.desc}</div>
                )}
              </div>
            ))}
            {LBL("BOXING — SHAKE OFF THE RUST")}
            {CARD(<>
              <div style={{fontSize:"12px",color:"#e8ff47",fontWeight:"700",marginBottom:"8px"}}>🥊 First 2 Weeks — Foundations Only</div>
              {["Start with shadowboxing only. No bag until form feels natural.","Jab-cross rhythm first. Don't rush combinations.","Rotate from hips — the punch starts at the feet.","Head movement matters more than power right now.","After 2 weeks: bag work starts. 2-min rounds with 1-min rest."].map((t,i)=>(
                <div key={i} style={{fontSize:"11px",color:"#888",padding:"3px 0",display:"flex",gap:"8px"}}><span style={{color:"#e8ff47",flexShrink:0}}>→</span>{t}</div>
              ))}
            </>,{borderLeft:"3px solid #e8ff47"})}
            {LBL("MILESTONE MARKERS")}
            {[
              {range:"Days 1–14",color:"#47d4ff",icon:"🌱",items:["Gym bag packed the night before — every time","20-min morning routine before Arjun needs you","You notice when you're slouching (awareness = step one)","First pull-up logged at the gym"]},
              {range:"Weeks 3–6",color:"#e8ff47",icon:"📈",items:["Pull-ups logging consistently — trend visible","Evening gym sessions feel sustainable","Boxing combinations start flowing again","Week score consistently 55%+"]},
              {range:"Month 2–3",color:"#ff7847",icon:"🔥",items:["Pull-up reps climbing — aim for 8–10 by week 10","Flexibility improved","Missing a session creates discomfort — habit locked","Posture holding without effort"]},
              {range:"Month 4–5 (Diwali prep)",color:"#a8ff87",icon:"🪔",items:["15+ pull-ups in one clean set","Boxing rounds 5+ with good form","Energy stable all day","20 pull-ups on November 8 🪔"]},
            ].map((m,i) => (
              <div key={i} style={{background:"#141414",border:`1px solid ${m.color}20`,borderLeft:`3px solid ${m.color}`,borderRadius:"8px",padding:"14px 16px",marginBottom:"10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
                  <span style={{fontSize:"16px"}}>{m.icon}</span>
                  <div style={{fontSize:"10px",fontWeight:"700",color:m.color,letterSpacing:"2px"}}>{m.range.toUpperCase()}</div>
                </div>
                {m.items.map((item,j)=>(
                  <div key={j} style={{fontSize:"11px",color:"#aaa",padding:"3px 0",display:"flex",gap:"8px"}}><span style={{color:m.color,fontSize:"9px",paddingTop:"2px",flexShrink:0}}>→</span>{item}</div>
                ))}
              </div>
            ))}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
