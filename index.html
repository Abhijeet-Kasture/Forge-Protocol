function scaleSession(s, gymCount) {
  if (gymCount <= 30) return s;
  const scaled = JSON.parse(JSON.stringify(s));
  scaled.label = s.l + " (R2)";
  scaled.e = s.e.map(ex => {
    const sets = ex.s
      .replace(/^3x([0-9])/,"4x$1").replace(/^3xmax/,"5xmax")
      .replace(/^3x([0-9]+)s/,(_,n)=>"4x"+(parseInt(n)+5)+"s")
      .replace(/^2x([0-9]+)s/,(_,n)=>"3x"+(parseInt(n)+5)+"s")
      .replace(/^2xmax/,"3xmax");
    return {...ex, s: sets, no: ex.no+" [R2: push the load]"};
  });
  return scaled;
}

function getGymSession(gymCount) {
  if (!gymCount || gymCount < 1) gymCount = 1;
  const eff = Math.min(gymCount, 60);
  const isR2 = eff > 30;
  const pos = (eff - 1) % 30;
  const focusIdx = pos % 3;
  const sessionNum = Math.floor(pos / 3);
  const focuses = ["upper","lower","core"];
  const focus = focuses[focusIdx];
  const arr = GS.filter(s => s.f === focus);
  const session = arr[sessionNum % arr.length];
  const result = isR2 ? scaleSession(session, gymCount) : {...session};
  result._label = result.label || result.l || result.id;
  result._focus = focus;
  result._sessionNum = eff;
  return result;
}

function getNextGymSession(gymCount) { return getGymSession((gymCount||0)+1); }

function Sparkline({data,color,height}){
  color=color||"#e8ff47";height=height||48;
  if(!data||data.length<2)return null;
  const max=Math.max(...data,1),w=300,h=height,pad=4;
  const xs=data.map((_,i)=>pad+(i/(data.length-1))*(w-pad*2));
  const ys=data.map(v=>h-pad-(v/max)*(h-pad*2));
  const path=xs.map((x,i)=>(i===0?"M":"L")+x.toFixed(1)+","+ys[i].toFixed(1)).join(" ");
  const area=path+" L"+xs[xs.length-1].toFixed(1)+","+h+" L"+xs[0].toFixed(1)+","+h+" Z";
  return (<svg viewBox={"0 0 "+w+" "+h} style={{width:"100%",height,display:"block"}} preserveAspectRatio="none">
    <path d={area} fill={color+"18"}/><path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    {xs.map((x,i)=><circle key={i} cx={x} cy={ys[i]} r="3" fill={color}/>)}
  </svg>);
}

  const [key,setKey]=useState("");
  const [err,setErr]=useState("");
  function submit(){
    const k=key.trim().toLowerCase().replace(/\s+/g,"-");
    if(k.length<4){setErr("Key must be at least 4 characters.");return;}
    localStorage.setItem("forge_userkey",k);onSave(k);

  return (<div style={{minHeight:"100vh",background:"#0e0e0e",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}}>
    <div style={{fontSize:"9px",letterSpacing:"4px",color:"#bbb",marginBottom:"6px"}}>DAILY PERFORMANCE SYSTEM</div>

  useEffect(()=>{
    if(!userKey)return;
    // Load progress from localStorage immediately (instant, no flicker)
    const localProg = localStorage.getItem("forge_progress_"+userKey);
    if(localProg){try{setProgRaw(JSON.parse(localProg));}catch(e){}}
    (async()=>{
      setSyncing(true);
      try{
        const wr=await sbGetWeek(userKey,weekId);
        if(wr.length>0)setWeekDataRaw(wr[0].data||{});
        const ar=await sbGet("forge_logs",userKey);setAllWeeks(ar);
        const pr=await sbGet("forge_pullups",userKey);
        if(pr.length>0)setPullupLogsRaw(pr[0].logs||[]);
        // Try forge_progress table — may not exist yet, localStorage is the fallback
        try{
          const pgr=await sbGet("forge_progress",userKey);
          if(pgr.length>0){
            const sbProg=pgr[0].data||{};
            // Use whichever has higher gym_count (more authoritative)
            const localP=localProg?JSON.parse(localProg):{};
            const merged=(sbProg.gym_count||0)>=(localP.gym_count||0)?sbProg:localP;
            setProgRaw(merged);
            localStorage.setItem("forge_progress_"+userKey,JSON.stringify(merged));
          }
        }catch(e){}
      }catch(e){}
      setSyncing(false);
    })();
  },[userKey]);

  function syncW(data){clearTimeout(ref.current);ref.current=setTimeout(async()=>{try{await sbUpsert("forge_logs",{key:userKey,week_id:weekId,data,updated_at:new Date().toISOString()});const ar=await sbGet("forge_logs",userKey);setAllWeeks(ar);setSyncSt("saved");setTimeout(()=>setSyncSt(""),2000);}catch(e){setSyncSt("error");}},800);}
  function syncPU(logs){clearTimeout(ref.current);ref.current=setTimeout(async()=>{try{await sbUpsert("forge_pullups",{key:userKey,logs,updated_at:new Date().toISOString()});setSyncSt("saved");setTimeout(()=>setSyncSt(""),2000);}catch(e){setSyncSt("error");}},800);}
  function syncPG(p){
    // Always save to localStorage immediately
    localStorage.setItem("forge_progress_"+userKey,JSON.stringify(p));
    clearTimeout(ref.current);ref.current=setTimeout(async()=>{
      try{
        await sbUpsert("forge_progress",{key:userKey,data:p,updated_at:new Date().toISOString()});
        setSyncSt("saved");setTimeout(()=>setSyncSt(""),2000);
      }catch(e){
        // Supabase failed (table may not exist) but localStorage saved it
        setSyncSt("local");setTimeout(()=>setSyncSt(""),2000);
      }
    },800);
  }

  function setWD(upd){setWeekDataRaw(prev=>{const next=typeof upd==="function"?upd(prev):upd;syncW(next);return next;});}
  function setPU(upd){setPullupLogsRaw(prev=>{const next=typeof upd==="function"?upd(prev):upd;syncPU(next);return next;});}
  function setProg(upd){setProgRaw(prev=>{const next=typeof upd==="function"?upd(prev):upd;syncPG(next);return next;});}
  function toggle(day,k){setWD(prev=>{const d=prev[day]||{};return {...prev,[day]:{...d,[k]:!d[k]}};});}

  function completeSession(type){
    // Only log once per day per type
    if(td.workout_done && td.workout_type===type) return;
    const ck=(type==="punchBag"||type==="shadowBoxing")?"boxing_count":type==="yoga"?"yoga_count":type==="rest"?"rest_count":type==="home"?"home_count":"gym_count";
    const countBefore=(prog[ck]||0);
    const sessionNumUsed=countBefore+1;
    const gymS=getGymSession(sessionNumUsed);
    const sid=type==="gym"?(gymS||{}).id||"gym":type;
    setProg(prev=>{
      const lg={date:new Date().toLocaleDateString("en-GB"),type,sessionId:sid,countUsed:sessionNumUsed,ts:Date.now()};
      return {...prev,[ck]:(prev[ck]||0)+1,session_log:[...(prev.session_log||[]),lg].slice(-200)};
    });
    // Store which session number was shown when logged, so we can replay it
    setWD(prev=>{const d=prev[todayFull]||{};return {...prev,[todayFull]:{...d,workout_done:true,workout_type:type,session_num_used:sessionNumUsed}};});
  }

  function getSession(type){
    // If already completed today for this type, show the session that was actually done
    const alreadyDoneToday = td.workout_done && td.workout_type===type;

                  <div style={{width:"60px",fontSize:"10px",color:"#999"}}>{wl[i]}</div>
                  <div style={{flex:1,background:"#0e0e0e",borderRadius:"100px",height:"6px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:w.score+"%",background:SC(w.score),borderRadius:"100px"}}/>
                  </div>
                  <div style={{width:"36px",fontSize:"12px",fontWeight:"700",color:SC(w.score),textAlign:"right"}}>{w.score}%</div>
                  <div style={{width:"24px",fontSize:"9px",color:"#777",textAlign:"right"}}>{w.workoutDays}✓</div>
                </div>
              ))}
            </>)}
            {progView==="sessions"&&(<>
              <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
                {STAT("GYM",prog.gym_count,`session ${prog.gym_count}/60`,phase.color)}
                {STAT("BOXING",prog.boxing_count,"sessions","#f87171")}
              </div>
              <div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:10,padding:"14px 16px"}}>
                <div style={{fontSize:9,color:"#ddd",letterSpacing:3,marginBottom:10}}>RECENT SESSIONS</div>
                {(prog.session_log||[]).slice(-15).reverse().map((s,i)=>{
                  const wt=WT.find(w=>w.id===s.type);
                  return <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:i<14?"1px solid #1a1a1a":"none"}}>
                    <div style={{fontSize:16}}>{wt?wt.icon:"?"}</div>
                    <div style={{flex:1}}><div style={{fontSize:11,color:"#ddd"}}>{s.sessionId||s.type}</div><div style={{fontSize:9,color:"#555"}}>{s.date}</div></div>
                    <div style={{fontSize:9,color:wt?wt.color:"#555"}}>{wt?wt.label:""}</div>
                  </div>;
                })}
                {(!prog.session_log||prog.session_log.length===0)&&<div style={{fontSize:11,color:"#444"}}>No sessions logged yet</div>}
              </div>
            </>)}
            {progView==="habits"&&(<>
              {HABITS_IDS.map(h=>{const h2=ht[h],hab=HABITS.find(x=>x.id===h);return(
                <div key={h} style={{background:"#141414",borderRadius:"8px",padding:"12px 14px",marginBottom:"8px",border:"1px solid #2a2a2a"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                    <div style={{fontSize:"12px",color:"#ddd",fontWeight:"600"}}>{hab?hab.icon:""} {hab?hab.title:h}</div>
                    <div style={{fontSize:"13px",fontWeight:"700",color:SC(h2.pct)}}>{h2.pct}%</div>
                  </div>
                  <div style={{background:"#0e0e0e",borderRadius:"100px",height:"6px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:h2.pct+"%",background:SC(h2.pct),borderRadius:"100px"}}/>
                  </div>
                  <div style={{fontSize:"9px",color:"#555",marginTop:"4px"}}>{h2.d} of {h2.p} days</div>
                </div>
              );})}
            </>)}
          </div>);
        })()}

        {tab==="logs"&&(
          <div>
            {LBL("ALL SESSION LOGS")}
            {allWeeks.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:"#555"}}>No logs yet.</div>:[...allWeeks].sort((a,b)=>new Date(b.week_id)-new Date(a.week_id)).map((row,wi)=>{
              const isOpen=expandedLog===wi,data=row.data||{},wd2=new Date(row.week_id),wl2=`${wd2.toLocaleString("default",{month:"short"})} ${wd2.getDate()}`;
              let tc=0,dc=0;FULL_DAYS.forEach(day=>{const d=data[day]||{};tc+=HABITS.length+1;dc+=HABITS_IDS.filter(h=>d[h]).length+(d.workout_done?1:0);});
              const score=tc?Math.round((dc/tc)*100):0;
              return (<div key={wi} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"10px",marginBottom:"10px",overflow:"hidden"}}>
                <div onClick={()=>setExpandedLog(isOpen?null:wi)} style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                  <div><div style={{fontSize:"12px",color:"#fff",fontWeight:"700"}}>Week of {wl2}</div>
                  <div style={{fontSize:"10px",color:"#666",marginTop:"2px"}}>{FULL_DAYS.filter(f=>(data[f]||{}).workout_done).length} workouts</div></div>
                  <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                    <div style={{fontSize:"16px",fontWeight:"800",color:SC(score)}}>{score}%</div>
                    <span style={{color:"#555"}}>{isOpen?"▲":"▼"}</span>
                  </div>
                </div>
                {isOpen&&<div style={{padding:"0 16px 16px"}}>
                  {FULL_DAYS.map(day=>{
                    const d=data[day]||{},hd=HABITS_IDS.filter(h=>d[h]).length;
                    if(!d.workout_type&&!d.workout_done&&!d.note&&hd===0)return null;
                    const wt=WT.find(w=>w.id===d.workout_type);
                    return <div key={day} style={{padding:"8px 10px",background:"#0d0d0d",borderRadius:"7px",marginBottom:"6px",borderLeft:"3px solid "+(d.workout_done?(wt?wt.color:"#a8ff87"):"#333")}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"3px"}}>
                        <div style={{fontSize:"11px",color:"#ccc",fontWeight:"600"}}>{day}</div>
                        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                          {wt&&<span style={{fontSize:"9px",color:wt.color}}>{wt.icon} {wt.label}</span>}
                          {d.workout_done&&<span style={{fontSize:"9px",color:"#a8ff87"}}>✓</span>}
                          <span style={{fontSize:"9px",color:"#555"}}>{hd}/{HABITS_IDS.length}</span>
                        </div>
                      </div>
                      {d.note&&<div style={{fontSize:"11px",color:"#888",fontStyle:"italic"}}>"{d.note}"</div>}
                    </div>;
                  })}
                </div>}
              </div>);
            })}
          </div>
        )}

        {tab==="habits"&&(
          <div>
            {LBL("YOUR DAILY PROTOCOL")}
            {HABITS.map(h=>{
              const isOpen=expandedHabit===h.id;
              return <div key={h.id} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"10px",marginBottom:"10px",overflow:"hidden"}}>
                <div onClick={()=>setExpandedHabit(isOpen?null:h.id)} style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                  <div style={{display:"flex",gap:"12px",alignItems:"center"}}>
                    <span style={{fontSize:"20px"}}>{h.icon}</span>
                    <div style={{fontSize:"13px",color:"#fff",fontWeight:"700"}}>{h.title}</div>
                  </div>
                  <span style={{color:"#555"}}>{isOpen?"▲":"▼"}</span>
                </div>
                {isOpen&&<div style={{padding:"0 16px 16px",borderTop:"1px solid #222"}}>
                  <div style={{fontSize:"12px",color:"#aaa",lineHeight:1.6,marginTop:"10px"}}>{h.desc}</div>
                </div>}
              </div>;
            })}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
